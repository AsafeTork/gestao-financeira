// ── Primitives ──────────────────────────────────────────────────────────────
const Inp=({label,hint,className='',...p})=>(
  <div className={`flex flex-col gap-1.5 ${className}`}>
    {label&&<label className="text-xs font-semibold text-gray-400 uppercase tracking-wide">{label}</label>}

    {hint&&<p className="text-xs text-gray-400">{hint}</p>}
  </div>
);
const Sel=({label,className='',children,...p})=>(
  <div className={`flex flex-col gap-1.5 ${className}`}>
    {label&&<label className="text-xs font-semibold text-gray-400 uppercase tracking-wide">{label}</label>}
    <select className="border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:border-gray-500 transition" {...p}>{children}</select>

);
const Textarea=({label,className='',...p})=>(
  <div className={`flex flex-col gap-1.5 ${className}`}>
    {label&&<label className="text-xs font-semibold text-gray-400 uppercase tracking-wide">{label}</label>}
    <textarea className="border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:border-gray-500 transition w-full resize-none" rows={6} {...p}/>
  </div>
);
const Card=({children,className=''})=><div className={`bg-white rounded-2xl shadow-sm border border-gray-100 ${className}`}>{children}</div>;
const Spin=({white,size=5})=><div className={`w-${size} h-${size} border-2 rounded-full animate-spin flex-shrink-0 ${white?'border-white border-t-transparent':'border-gray-300 border-t-gray-700'}`}/>;
const Badge=({color='gray',children})=>{
  const colors={gray:'bg-gray-100 text-gray-600',green:'bg-green-50 text-green-700',red:'bg-red-50 text-red-600',amber:'bg-amber-50 text-amber-700',blue:'bg-blue-50 text-blue-700'};
  return<span className={`text-xs font-medium px-2 py-0.5 rounded-full ${colors[color]}`}>{children}</span>;
};

// ── Toast ───────────────────────────────────────────────────────────────────
const ToastBar=({toast})=>toast?(

    <div className={`flex items-center gap-2.5 px-5 py-3 rounded-2xl shadow-xl text-sm font-medium text-white whitespace-nowrap ${toast.type==='error'?'bg-red-600':'bg-gray-900'}`}>
      <span className="text-base">{toast.type==='error'?'✗':'✓'}</span>{toast.msg}
    </div>
  </div>
):null;

// ── Offline Banner ──────────────────────────────────────────────────────────
const OfflineBanner=()=>{
  const[offline,setOffline]=useState(!navigator.onLine);
  useEffect(()=>{
    const on=()=>setOffline(false);
    const off=()=>setOffline(true);
    window.addEventListener('online',on);
    window.addEventListener('offline',off);
    return()=>{window.removeEventListener('online',on);window.removeEventListener('offline',off);};
  },[]);
  return offline?(
    <div className="fixed top-0 left-0 right-0 z-50 bg-amber-500 text-white text-xs font-semibold text-center py-2">
      ⚠️ Sem conexão com a internet — as alterações não serão salvas
    </div>
  ):null;
};

// ── Confirm Dialog ──────────────────────────────────────────────────────────
const Confirm=({msg,onConfirm,onCancel,danger=true})=>(

);

        <button onClick={onSave} disabled={saving} className="flex-1 text-white rounded-xl py-2.5 text-sm font-semibold hover:opacity-90 flex items-center justify-center gap-2" style={{background:color}}>

// ── Product Search ──────────────────────────────────────────────────────────
const ProductSearch=({products,value,onSelect,onChange,placeholder})=>{
  const[open,setOpen]=useState(false);
  const filtered=value.length>0?products.filter(p=>p.name.toLowerCase().includes(value.toLowerCase())):products;
  return(
    <div className="relative flex-1">
      <input value={value} onChange={e=>{onChange(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)} onBlur={()=>setTimeout(()=>setOpen(false),120)}
        placeholder={placeholder||(products.length>0?'Buscar produto ou serviço…':'Descrição')}
        className="border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:border-gray-500 transition w-full"/>
      {open&&products.length>0&&filtered.length>0&&(
        <div className="absolute top-full left-0 right-0 mt-1 bg-white rounded-xl border border-gray-200 z-30 overflow-hidden max-h-48 overflow-y-auto" style={{boxShadow:'0 8px 24px rgba(0,0,0,0.1)'}}>
          {filtered.map(p=>(
            <button key={p.id} onMouseDown={()=>{onSelect(p);setOpen(false);}} className="flex items-center justify-between w-full px-3 py-2.5 hover:bg-gray-50 text-left border-b border-gray-50 last:border-0">
              <div className="flex items-center gap-2 min-w-0">
                {p.category&&<span className="text-xs bg-gray-100 text-gray-400 px-1.5 py-0.5 rounded-md flex-shrink-0">{p.category}</span>}
                <span className="text-sm text-gray-800 truncate">{p.name}</span>
                {p.stock!=null&&<span className={`text-xs px-1.5 py-0.5 rounded-full flex-shrink-0 ${p.stock<=0?'bg-red-50 text-red-500':p.stock<=5?'bg-amber-50 text-amber-600':'bg-gray-100 text-gray-500'}`}>{p.stock}un</span>}
              </div>
              <span className="text-xs font-semibold text-gray-400 ml-2">{R$(p.price)}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
};

// ── Cart ────────────────────────────────────────────────────────────────────
const CartRow=({item,idx,products,onChange,onSelect,onRemove})=>{
  const lt=(Number(item.qty)||0)*(Number(item.up)||0);
  return(
    <div className="rounded-xl border border-gray-100 bg-gray-50 p-3 flex flex-col gap-2">
      <div className="flex items-center gap-2">
        <ProductSearch products={products} value={item.desc} onSelect={p=>onSelect(idx,p.name,p.price)} onChange={v=>onChange(idx,'desc',v)}/>
        {onRemove&&<button onClick={onRemove} className="text-gray-300 hover:text-red-400 p-1 flex-shrink-0"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg></button>}
      </div>
      <div className="flex items-end gap-2">
        <Inp label="Qtd" type="number" min="1" value={item.qty} onChange={e=>onChange(idx,'qty',e.target.value)} className="w-16 flex-shrink-0"/>
        <Inp label="Preço unit." type="number" step="0.01" min="0" value={item.up} onChange={e=>onChange(idx,'up',e.target.value)} className="flex-1"/>
        <div className="flex flex-col gap-1.5 w-24 flex-shrink-0">
          <label className="text-xs font-semibold text-gray-400 uppercase tracking-wide">Total</label>
          <div className="border border-gray-100 rounded-xl px-3 py-2.5 text-sm bg-white text-gray-700 font-semibold">{lt>0?R$(lt):'—'}</div>
        </div>
      </div>
    </div>
  );
};

const SaleForm=({products,brand,onSave,onClose})=>{
  const[items,setItems]=useState([{desc:'',qty:'1',up:''}]);
  const[date,setDate]=useState(today());
  const[method,setMethod]=useState('PIX');
  const[saving,setSaving]=useState(false);
  const total=items.reduce((s,i)=>s+(Number(i.qty)||0)*(Number(i.up)||0),0);
  const ch=(idx,f,v)=>setItems(p=>p.map((it,i)=>i===idx?{...it,[f]:v}:it));
  const sel=(idx,name,price)=>setItems(p=>p.map((it,i)=>i===idx?{...it,desc:name,up:String(price)}:it));
  const save=async()=>{
    const valid=items.filter(i=>i.desc&&i.up);
    if(!valid.length||!total)return;
    setSaving(true);
    await onSave({id:uid(),type:'income',desc:sanitize(valid.length===1?valid[0].desc:`${valid.length} itens`),items:valid.map(i=>({desc:sanitize(i.desc),qty:Number(i.qty)||1,unitPrice:Number(i.up)})),amount:total,date,method});
    onClose();
  };
  return(
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 anim-fade" style={{background:'rgba(0,0,0,0.5)'}}>
      <div className="bg-white rounded-t-2xl sm:rounded-2xl w-full sm:max-w-lg flex flex-col" style={{maxHeight:'90vh',boxShadow:'0 25px 60px rgba(0,0,0,0.2)'}}>
        <div className="flex items-center justify-between px-6 py-4 border-b border-gray-100 flex-shrink-0">
          <span className="font-semibold text-gray-900">Nova Venda</span>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 p-1 rounded-lg hover:bg-gray-100"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg></button>
        </div>
        <div className="overflow-y-auto flex-1 px-6 py-4 flex flex-col gap-4">
          <div className="flex flex-col gap-3">
            {items.map((it,idx)=><CartRow key={idx} item={it} idx={idx} products={products} onChange={ch} onSelect={sel} onRemove={items.length>1?()=>setItems(p=>p.filter((_,i)=>i!==idx)):null}/>)}
            <button onClick={()=>setItems(p=>[...p,{desc:'',qty:'1',up:''}])} className="flex items-center gap-2 text-sm text-gray-400 hover:text-gray-600 w-fit">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>Adicionar item
            </button>
          </div>
          <div className="flex items-center justify-between py-3 border-t border-b border-gray-100">
            <span className="text-sm font-semibold text-gray-600">Total da venda</span>
            <span className="text-2xl font-bold text-gray-900">{R$(total)}</span>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <Inp label="Data" type="date" value={date} onChange={e=>setDate(e.target.value)}/>
            <Sel label="Pagamento" value={method} onChange={e=>setMethod(e.target.value)}>
              {['PIX','Dinheiro','Cartão de Débito','Cartão de Crédito','Boleto','Transferência'].map(m=><option key={m}>{m}</option>)}
            </Sel>
          </div>
        </div>
        <div className="flex gap-2 px-6 pb-6 pt-3 flex-shrink-0">
          <button onClick={onClose} className="flex-1 border border-gray-200 text-gray-600 rounded-xl py-3 text-sm font-medium hover:bg-gray-50">Cancelar</button>
          <button onClick={save} disabled={saving} className="flex-1 text-white rounded-xl py-3 text-sm font-semibold hover:opacity-90 flex items-center justify-center gap-2" style={{background:brand.color}}>
            {saving?<Spin white/>:`Confirmar · ${R$(total)}`}
          </button>
        </div>
      </div>
    </div>
  );
};

// ── SVG Chart ───────────────────────────────────────────────────────────────
const BarChart=({data})=>{
  const max=Math.max(...data.flatMap(d=>[d.i,d.o]),1);
  const W=44,H=130,bw=10,pad=4;
  return(
    <svg width="100%" height={H} viewBox={`0 0 ${data.length*W} ${H}`} preserveAspectRatio="xMidYMid meet">
      {data.map((d,i)=>{
        const x=i*W+pad,ih=Math.round((d.i/max)*(H-24)),oh=Math.round((d.o/max)*(H-24));
        return(<g key={i}><rect x={x} y={H-24-ih} width={bw} height={ih||1} fill="#16a34a" rx={2}/><rect x={x+bw+2} y={H-24-oh} width={bw} height={oh||1} fill="#fca5a5" rx={2}/><text x={x+bw+1} y={H-6} textAnchor="middle" fontSize={9} fill="#9ca3af">{d.day}</text></g>);
      })}
    </svg>
  );
};
const KpiCard=({label,value,sub,color})=>(
  <Card className="p-5 overflow-hidden relative">
    <div className="absolute top-0 left-0 right-0 h-0.5 rounded-t-2xl" style={{background:color}}/>

    <p className="text-xl font-bold mt-2 text-gray-900 truncate">{value}</p>
    {sub&&<p className="text-xs text-gray-400 mt-0.5 truncate">{sub}</p>}

);

// ── Dashboard ────────────────────────────────────────────────────────────────
const Dashboard=({tx,products,brand,onNav})=>{
  const cm=today().slice(0,7);
  const mtx=tx.filter(t=>t.date.startsWith(cm));
  const ti=mtx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const to=mtx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const dtx=tx.filter(t=>t.date===today());
  const di=dtx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const dout=dtx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const chartData=useMemo(()=>Array.from({length:7},(_,i)=>{
    const d=prevDays(6-i),dt=tx.filter(t=>t.date===d);
    return{day:new Date(d+'T12:00').toLocaleDateString('pt-BR',{weekday:'short'}),i:dt.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0),o:dt.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0)};
  }),[tx]);
  const lowStock=products.filter(p=>p.stock!=null&&p.stock<=5);
  const recent=[...tx].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,6);
  return(
    <div className="flex flex-col gap-6">
      <div><h2 className="text-2xl font-bold text-gray-900">Dashboard</h2><p className="text-sm text-gray-400 mt-0.5">{new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p></div>
      {lowStock.length>0&&(
        <div className="rounded-2xl border border-amber-200 bg-amber-50 px-5 py-4 flex flex-col gap-2">
          <div className="flex items-center justify-between"><p className="text-sm font-semibold text-amber-800">⚠️ Estoque baixo</p><button onClick={()=>onNav('inventory')} className="text-xs text-amber-600 font-semibold hover:underline">Ver estoque →</button></div>
          {lowStock.map(p=><div key={p.id} className="flex items-center justify-between"><span className="text-sm text-amber-700">{p.name}</span><Badge color={p.stock<=0?'red':'amber'}>{p.stock<=0?'Esgotado':`${p.stock} un.`}</Badge></div>)}
        </div>
      )}
      <div className="grid grid-cols-2 gap-3">
        <KpiCard label="Entradas (mês)" value={R$(ti)} color="#16a34a"/>
        <KpiCard label="Saídas (mês)" value={R$(to)} color="#ef4444"/>
        <KpiCard label="Lucro líquido" value={R$(ti-to)} color={brand.color} sub="Este mês"/>
        <KpiCard label="Saldo hoje" value={R$(di-dout)} color="#3b82f6" sub={`+${R$(di)} / -${R$(dout)}`}/>
      </div>
      <Card className="p-5">
        <div className="flex items-center justify-between mb-3">
          <p className="text-sm font-semibold text-gray-800">Fluxo — últimos 7 dias</p>
          <div className="flex gap-3 text-xs text-gray-400">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-sm bg-green-600 inline-block"/>Entradas</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-sm bg-red-200 inline-block"/>Saídas</span>
          </div>
        </div>
        {tx.length===0?<div className="flex flex-col items-center py-8 gap-2"><p className="text-sm text-gray-300">Nenhuma movimentação ainda</p><button onClick={()=>onNav('income')} className="text-xs font-semibold text-green-600 hover:underline">Registrar primeira venda →</button></div>:<BarChart data={chartData}/>}
      </Card>
      <Card>
        <div className="px-5 py-4 border-b border-gray-50 flex items-center justify-between">
          <p className="text-sm font-semibold text-gray-800">Movimentações recentes</p>
          {recent.length>0&&<button onClick={()=>onNav('report')} className="text-xs text-gray-400 hover:text-gray-600">Ver relatório →</button>}
        </div>
        {recent.length===0?(
          <div className="py-12 text-center flex flex-col items-center gap-2">
            <span className="text-3xl">📋</span>
            <p className="text-sm text-gray-500 font-medium">Nenhuma movimentação</p>
            <div className="flex gap-3 mt-1">
              <button onClick={()=>onNav('income')} className="text-xs font-semibold text-green-600 hover:underline">+ Venda</button>
              <button onClick={()=>onNav('expense')} className="text-xs font-semibold text-red-500 hover:underline">+ Despesa</button>
            </div>
          </div>
        ):(
          <div className="divide-y divide-gray-50">
            {recent.map(t=>(
              <div key={t.id} className="flex items-center justify-between px-5 py-3.5">
                <div className="flex items-center gap-3 min-w-0">
                  <div className={`w-8 h-8 rounded-xl flex items-center justify-center text-sm font-bold flex-shrink-0 ${t.type==='income'?'bg-green-50 text-green-600':'bg-red-50 text-red-500'}`}>{t.type==='income'?'↑':'↓'}</div>
                  <div className="min-w-0"><p className="text-sm font-medium text-gray-800 truncate">{t.desc}</p><p className="text-xs text-gray-400">{fmtDate(t.date)} · {t.method||t.category}</p></div>
                </div>
                <span className={`text-sm font-semibold flex-shrink-0 ml-3 ${t.type==='income'?'text-green-600':'text-red-500'}`}>{t.type==='income'?'+':'-'}{R$(t.amount)}</span>
              </div>
            ))}
          </div>
        )}
      </Card>
    </div>
  );
};

// ── Transaction List (shared Income/Expense) ────────────────────────────────
const TxView=({type,tx,products,onAdd,onEdit,onDelete,onDeductStock,brand,showToast,showConfirm})=>{
  const isIncome=type==='income';
  const[modal,setModal]=useState(false);
  const[editItem,setEditItem]=useState(null);
  const[saving,setSaving]=useState(false);
  const[search,setSearch]=useState('');
  const[dateFrom,setDateFrom]=useState('');
  const[dateTo,setDateTo]=useState('');
  const cats=['Fixo','Variável','Estoque','Marketing','Pessoal','Serviços','Outro'];
  const[form,setForm]=useState({desc:'',amount:'',date:today(),cat:'Fixo',method:'PIX'});

  let filtered=tx.filter(t=>t.type===type);
  if(search)filtered=filtered.filter(t=>t.desc.toLowerCase().includes(search.toLowerCase()));
  if(dateFrom)filtered=filtered.filter(t=>t.date>=dateFrom);
  if(dateTo)filtered=filtered.filter(t=>t.date<=dateTo);
  filtered.sort((a,b)=>b.date.localeCompare(a.date));
  const total=filtered.reduce((s,t)=>s+t.amount,0);

  const openEdit=t=>setEditItem({id:t.id,desc:t.desc,amount:String(t.amount),date:t.date,cat:t.category||'Fixo',method:t.method||'PIX'});
  const saveEdit=async()=>{
    if(!editItem.desc||!editItem.amount)return;
    setSaving(true);
    await onEdit(editItem.id,{desc:sanitize(editItem.desc),amount:Number(editItem.amount),date:editItem.date,method:isIncome?editItem.method:null,cat:isIncome?null:editItem.cat});
    showToast(isIncome?'Venda atualizada':'Despesa atualizada');setSaving(false);setEditItem(null);
  };
  const saveNew=async()=>{
    if(!form.desc||!form.amount)return;
    setSaving(true);
    await onAdd({id:uid(),type,desc:sanitize(form.desc),amount:Number(form.amount),date:form.date,method:isIncome?form.method:null,cat:isIncome?null:form.cat});
    showToast(isIncome?'Venda registrada!':'Despesa registrada!');setModal(false);setSaving(false);setForm({desc:'',amount:'',date:today(),cat:'Fixo',method:'PIX'});
  };

  const exportCSV=()=>{
    const header='Data,Tipo,Descrição,Valor (R$),Método/Categoria';
    const rows=filtered.map(t=>`${t.date},${t.type==='income'?'Entrada':'Saída'},"${t.desc}",${t.amount.toFixed(2)},${t.method||t.category||''}`);
    const csv='\uFEFF'+[header,...rows].join('\n');
    const a=document.createElement('a');
    a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
    a.download=`${isIncome?'vendas':'despesas'}-${today()}.csv`;
    a.click();
    showToast('CSV exportado!');
  };

  return(
    <div className="flex flex-col gap-6">
      <div className="flex items-start justify-between">
        <div><h2 className="text-2xl font-bold text-gray-900">{isIncome?'Vendas':'Despesas'}</h2>
          <p className="text-sm text-gray-400 mt-0.5">{filtered.length} registro{filtered.length!==1?'s':''} · <span className={`font-semibold ${isIncome?'text-green-600':'text-red-500'}`}>{R$(total)}</span></p>
        </div>
        <div className="flex gap-2">
          <button onClick={exportCSV} title="Exportar CSV" className="p-2.5 border border-gray-200 text-gray-500 rounded-xl hover:bg-gray-50 transition">
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          </button>
          <button onClick={()=>setModal(true)} className="flex items-center gap-2 text-white text-sm font-semibold px-4 py-2.5 rounded-xl hover:opacity-90" style={{background:brand.color}}>
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
            {isIncome?'Nova Venda':'Nova Despesa'}
          </button>
        </div>
      </div>

      {/* Filters */}
      <Card className="p-4 flex flex-col gap-3">
        <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide">Filtros</p>
        <div className="grid grid-cols-1 gap-2 sm:grid-cols-3">
          <div className="relative">
            <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar descrição…" className="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-xl focus:outline-none focus:border-gray-400 bg-white"/>
          </div>
          <Inp type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} placeholder="Data inicial"/>
          <Inp type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} placeholder="Data final"/>
        </div>
        {(search||dateFrom||dateTo)&&<button onClick={()=>{setSearch('');setDateFrom('');setDateTo('');}} className="text-xs text-gray-400 hover:text-gray-600 w-fit">✕ Limpar filtros</button>}
      </Card>

      <Card>
        {filtered.length===0?(
          <div className="py-14 flex flex-col items-center gap-3 text-center px-6">
            <div className="text-4xl">{isIncome?'💰':'📤'}</div>
            <p className="text-sm font-semibold text-gray-700">{search||dateFrom||dateTo?'Nenhum resultado para os filtros':'Nenhum registro ainda'}</p>
            <p className="text-xs text-gray-400">{isIncome?'Registre vendas com múltiplos itens e cálculo automático.':'Registre aluguel, energia, fornecedores e outras saídas.'}</p>
          </div>
        ):(
          <div className="divide-y divide-gray-50">
            {filtered.map(t=>(
              <div key={t.id} className="flex items-center justify-between px-4 py-3.5 gap-3">
                <div className="flex items-center gap-3 min-w-0 flex-1">
                  <div className={`w-8 h-8 rounded-xl flex items-center justify-center text-sm font-bold flex-shrink-0 ${isIncome?'bg-green-50 text-green-600':'bg-red-50 text-red-500'}`}>{isIncome?'↑':'↓'}</div>
                  <div className="min-w-0"><p className="text-sm font-medium text-gray-800 truncate">{t.desc}</p><p className="text-xs text-gray-400">{fmtDate(t.date)} · {t.method||t.category}{t.items&&t.items.length>1?` · ${t.items.length} itens`:''}</p></div>
                </div>
                <div className="flex items-center gap-1 flex-shrink-0">
                  <span className={`text-sm font-semibold mr-1 ${isIncome?'text-green-600':'text-red-500'}`}>{isIncome?'+':'-'}{R$(t.amount)}</span>
                  <EditBtn onClick={()=>openEdit(t)}/>
                  <DelBtn onClick={()=>showConfirm('Excluir este registro permanentemente?',async()=>{await onDelete(t.id);showToast('Registro removido');})}/>
                </div>
              </div>
            ))}
          </div>
        )}
      </Card>

      {/* New modal */}
      {modal&&(isIncome?(
        <SaleForm products={products} brand={brand} onSave={async sale=>{await onAdd(sale);if(sale.items)sale.items.forEach(it=>{const p=products.find(p=>p.name===it.desc);if(p&&p.stock!=null)onDeductStock(p.id,it.qty);});showToast('Venda registrada!');}} onClose={()=>setModal(false)}/>
      ):(
        <Modal title="Nova Despesa" onClose={()=>setModal(false)} onSave={saveNew} saving={saving}>
          <Inp label="Descrição" value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))} placeholder="Ex: Aluguel, Energia, Fornecedor…"/>
          <Inp label="Valor (R$)" type="number" step="0.01" min="0" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} placeholder="0,00"/>
          <Inp label="Data" type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>
          <Sel label="Categoria" value={form.cat} onChange={e=>setForm(f=>({...f,cat:e.target.value}))}>{cats.map(c=><option key={c}>{c}</option>)}</Sel>
        </Modal>
      ))}

      {/* Edit modal */}
      {editItem&&(
        <Modal title={isIncome?'Editar Venda':'Editar Despesa'} onClose={()=>setEditItem(null)} onSave={saveEdit} saving={saving} saveLabel="Salvar alterações">
          <Inp label="Descrição" value={editItem.desc} onChange={e=>setEditItem(f=>({...f,desc:e.target.value}))}/>
          <Inp label="Valor (R$)" type="number" step="0.01" min="0" value={editItem.amount} onChange={e=>setEditItem(f=>({...f,amount:e.target.value}))}/>
          <Inp label="Data" type="date" value={editItem.date} onChange={e=>setEditItem(f=>({...f,date:e.target.value}))}/>
          {isIncome?<Sel label="Pagamento" value={editItem.method} onChange={e=>setEditItem(f=>({...f,method:e.target.value}))}>{['PIX','Dinheiro','Cartão de Débito','Cartão de Crédito','Boleto','Transferência'].map(m=><option key={m}>{m}</option>)}</Sel>
          :<Sel label="Categoria" value={editItem.cat} onChange={e=>setEditItem(f=>({...f,cat:e.target.value}))}>{cats.map(c=><option key={c}>{c}</option>)}</Sel>}
        </Modal>
      )}
    </div>
  );
};

// ── Inventory View ────────────────────────────────────────────────────────────
const InventoryView=({products,losses,onAddProduct,onEditProduct,onDeleteProduct,onAddLoss,onEditLoss,onDeleteLoss,onAdjustStock,brand,showToast,showConfirm})=>{
  const[tab,setTab]=useState('products');
  const[search,setSearch]=useState('');
  const[collapsed,setCollapsed]=useState(new Set());
  const[pm,setPm]=useState(false);
  const[editProd,setEditProd]=useState(null);
  const[lm,setLm]=useState(false);
  const[editLoss,setEditLoss]=useState(null);
  const[sm,setSm]=useState(null);
  const[pf,setPf]=useState({name:'',category:'',price:'',cost:'',stock:''});
  const[lf,setLf]=useState({desc:'',qty:'1',reason:'',date:today()});
  const[sq,setSq]=useState('1');
  const[saving,setSaving]=useState(false);

  const saveProd=async()=>{
    if(!pf.name||!pf.price)return;
    setSaving(true);
    await onAddProduct({id:`P${String(Date.now()).slice(-6)}`,name:sanitize(pf.name),category:pf.category||null,price:Number(pf.price),cost:pf.cost?Number(pf.cost):null,stock:pf.stock!==''?Number(pf.stock):null});
    showToast('Produto adicionado!');setSaving(false);setPm(false);setPf({name:'',category:'',price:'',cost:'',stock:''});
  };
  const saveEditProd=async()=>{
    if(!editProd.name||!editProd.price)return;
    setSaving(true);
    await onEditProduct(editProd.id,{name:sanitize(editProd.name),category:editProd.category||null,price:Number(editProd.price),cost:editProd.cost?Number(editProd.cost):null,stock:editProd.stock!==''&&editProd.stock!=null?Number(editProd.stock):null});
    showToast('Produto atualizado');setSaving(false);setEditProd(null);
  };
  const saveLoss=async()=>{
    if(!lf.desc||!lf.qty)return;
    setSaving(true);
    await onAddLoss({id:uid(),desc:sanitize(lf.desc),qty:Number(lf.qty),reason:lf.reason,date:lf.date});
    const p=products.find(p=>p.name===lf.desc);
    if(p&&p.stock!=null)await onAdjustStock(p.id,-Number(lf.qty));
    showToast('Perda registrada');setSaving(false);setLm(false);setLf({desc:'',qty:'1',reason:'',date:today()});
  };
  const saveEditLoss=async()=>{
    if(!editLoss.desc||!editLoss.qty)return;
    setSaving(true);
    await onEditLoss(editLoss.id,{desc:sanitize(editLoss.desc),qty:Number(editLoss.qty),reason:editLoss.reason,date:editLoss.date});
    showToast('Perda atualizada');setSaving(false);setEditLoss(null);
  };
  const saveStock=async()=>{
    if(!sq||!sm)return;
    setSaving(true);
    await onAdjustStock(sm,Number(sq));
    showToast('Estoque atualizado!');setSaving(false);setSm(null);setSq('1');
  };

  const toggleCat=cat=>setCollapsed(p=>{const n=new Set(p);n.has(cat)?n.delete(cat):n.add(cat);return n;});
  const disp=search.trim()?products.filter(p=>[p.name,p.category,p.id].filter(Boolean).some(v=>v.toLowerCase().includes(search.toLowerCase()))):products;
  const grouped=Object.entries(disp.reduce((a,p)=>{const k=p.category||'Sem categoria';(a[k]=a[k]||[]).push(p);return a;},{})).sort(([a],[b])=>a==='Sem categoria'?1:b==='Sem categoria'?-1:a.localeCompare(b));
  const sp=sm?products.find(p=>p.id===sm):null;
  const openEditProd=p=>setEditProd({id:p.id,name:p.name,category:p.category||'',price:String(p.price),cost:p.cost!=null?String(p.cost):'',stock:p.stock!=null?String(p.stock):''});

  return(
    <div className="flex flex-col gap-6">
      <div className="flex items-start justify-between">
        <div><h2 className="text-2xl font-bold text-gray-900">Estoque</h2><p className="text-sm text-gray-400 mt-0.5">{products.length} item{products.length!==1?'s':''}</p></div>
        <div className="flex gap-2">
          {tab==='products'&&<button onClick={()=>setPm(true)} className="flex items-center gap-2 text-white text-sm font-semibold px-4 py-2.5 rounded-xl hover:opacity-90" style={{background:brand.color}}><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>Adicionar</button>}
          {tab==='losses'&&<button onClick={()=>setLm(true)} className="flex items-center gap-2 bg-red-600 text-white text-sm font-semibold px-4 py-2.5 rounded-xl hover:opacity-90"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>Perda</button>}
        </div>
      </div>
      <div className="flex gap-1 bg-gray-100 rounded-xl p-1">
        {[{key:'products',label:'Produtos e Serviços'},{key:'losses',label:'Perdas'}].map(t=>(
          <button key={t.key} onClick={()=>setTab(t.key)} className={`flex-1 py-2 text-sm font-medium rounded-lg transition ${tab===t.key?'bg-white text-gray-900 shadow-sm':'text-gray-500'}`}>{t.label}</button>
        ))}
      </div>
      {tab==='products'&&(
        <Card>
          <div className="px-5 py-3 border-b border-gray-50">
            <div className="relative">
              <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por nome ou categoria…" className="w-full pl-9 pr-3 py-2 text-sm bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:border-gray-300"/>
            </div>
          </div>
          {disp.length===0?<div className="py-14 flex flex-col items-center gap-3 text-center px-6"><div className="text-4xl">📦</div><p className="text-sm font-semibold text-gray-700">Nenhum item</p><p className="text-xs text-gray-400">Adicione produtos ou serviços com categoria, custo e estoque.</p></div>:(
            grouped.map(([cat,items])=>(
              <div key={cat}>
                <button onClick={()=>toggleCat(cat)} className="w-full flex items-center justify-between px-5 py-2.5 bg-gray-50 hover:bg-gray-100 transition border-b border-gray-100">
                  <div className="flex items-center gap-2">
                    <svg className={`w-3.5 h-3.5 text-gray-400 transition-transform ${collapsed.has(cat)?'-rotate-90':''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/></svg>
                    <span className="text-xs font-semibold text-gray-500 uppercase tracking-wide">{cat}</span>
                  </div>
                  <span className="text-xs text-gray-400">{items.length} {items.length===1?'item':'itens'}</span>
                </button>
                {!collapsed.has(cat)&&(
                  <div className="divide-y divide-gray-50">
                    {items.map(p=>(
                      <div key={p.id} className="px-4 py-3.5 flex items-center justify-between gap-3">
                        <div className="min-w-0 flex-1">
                          <p className="text-sm font-medium text-gray-800">{p.name}</p>
                          <div className="flex items-center gap-3 mt-0.5 flex-wrap">
                            <span className="text-xs text-gray-400">Venda: {R$(p.price)}</span>
                            {p.cost!=null&&<><span className="text-xs text-gray-400">Custo: {R$(p.cost)}</span><Badge color="green">Margem: {(((p.price-p.cost)/p.price)*100).toFixed(0)}%</Badge></>}
                          </div>
                        </div>
                        <div className="flex items-center gap-1 flex-shrink-0">
                          {p.stock!=null&&<button onClick={()=>{setSm(p.id);setSq('1');}} className={`text-xs font-semibold px-2.5 py-1 rounded-lg mr-1 ${p.stock<=0?'bg-red-50 text-red-600':p.stock<=5?'bg-amber-50 text-amber-700':'bg-green-50 text-green-700'}`}>{p.stock<=0?'Esgotado':`${p.stock} un`}</button>}
                          <EditBtn onClick={()=>openEditProd(p)}/>
                          <DelBtn onClick={()=>showConfirm(`Excluir "${p.name}"?`,async()=>{await onDeleteProduct(p.id);showToast('Produto removido');})}/>
                        </div>
                      </div>
                    ))}

const EmailView=({brand,showToast})=>{
  const[to,setTo]=useState('');
  const[subject,setSubject]=useState('');
  const[body,setBody]=useState('');
  const[template,setTemplate]=useState('custom');
  const[copied,setCopied]=useState(false);

  const applyTemplate=id=>{
    setTemplate(id);
    const t=EMAIL_TEMPLATES.find(t=>t.id===id);
    if(t){setSubject(t.subject);setBody(t.body);}
  };

  const send=()=>{
    if(!to||!subject||!body)return;
    const mailto=`mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    window.open(mailto,'_blank');
    showToast('Abrindo seu cliente de e-mail…');
  };

  const copyAll=async()=>{
    const text=`Para: ${to}\nAssunto: ${subject}\n\n${body}`;
    await navigator.clipboard.writeText(text);
    setCopied(true);setTimeout(()=>setCopied(false),2000);
    showToast('E-mail copiado!');
  };

  return(
    <div className="flex flex-col gap-6">
      <div><h2 className="text-2xl font-bold text-gray-900">Gerenciador de E-mails</h2><p className="text-sm text-gray-400 mt-0.5">Escreva, use templates e envie pelo seu e-mail</p></div>

      <Card className="p-5 flex flex-col gap-4">
        <div>
          <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Templates prontos</p>
          <div className="flex gap-2 flex-wrap">
            {EMAIL_TEMPLATES.map(t=>(
              <button key={t.id} onClick={()=>applyTemplate(t.id)}
                className={`text-xs font-medium px-3 py-1.5 rounded-xl border transition ${template===t.id?'border-transparent text-white':'border-gray-200 text-gray-600 hover:bg-gray-50'}`}
                style={template===t.id?{background:brand.color}:{}}>
                {t.name}
              </button>
            ))}
          </div>
        </div>
        <Inp label="Para (e-mail do destinatário)" type="email" value={to} onChange={e=>setTo(e.target.value)} placeholder="cliente@email.com"/>
        <Inp label="Assunto" value={subject} onChange={e=>setSubject(e.target.value)} placeholder="Assunto do e-mail"/>
        <Textarea label="Mensagem" value={body} onChange={e=>setBody(e.target.value)} placeholder="Escreva sua mensagem aqui…" style={{minHeight:'200px'}}/>
        <div className="bg-blue-50 border border-blue-100 rounded-xl px-4 py-3">
          <p className="text-xs text-blue-700 font-medium">💡 Substitua os textos entre [colchetes] com as informações reais antes de enviar.</p>
        </div>
        <div className="flex gap-2 pt-1">
          <button onClick={copyAll} className="flex-1 flex items-center justify-center gap-2 border border-gray-200 text-gray-700 rounded-xl py-2.5 text-sm font-medium hover:bg-gray-50 transition">
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
            {copied?'Copiado!':'Copiar tudo'}
          </button>
          <button onClick={send} disabled={!to||!subject||!body} className="flex-1 flex items-center justify-center gap-2 text-white rounded-xl py-2.5 text-sm font-semibold hover:opacity-90 transition disabled:opacity-40" style={{background:brand.color}}>
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
            Abrir no e-mail
          </button>
        </div>
      </Card>

      <Card className="p-5">
        <p className="text-sm font-semibold text-gray-800 mb-1">Como funciona</p>
        <div className="flex flex-col gap-2 mt-2">
          {['Escolha um template ou escreva do zero','Preencha o destinatário, assunto e mensagem','Substitua os textos em [colchetes] pelas informações reais','Clique em "Abrir no e-mail" para enviar pelo seu e-mail','Ou clique em "Copiar tudo" para colar no WhatsApp, Gmail, etc.'].map((s,i)=>(
            <div key={i} className="flex items-start gap-3">
              <span className="w-5 h-5 rounded-full bg-gray-100 text-gray-500 flex items-center justify-center text-xs font-bold flex-shrink-0 mt-0.5">{i+1}</span>
              <p className="text-sm text-gray-600">{s}</p>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
};

const ReportView=({tx,showToast})=>{
  const months=useMemo(()=>[...new Set(tx.map(t=>t.date.slice(0,7)))].sort((a,b)=>b.localeCompare(a)),[tx]);
  const[month,setMonth]=useState(today().slice(0,7));
  const filtered=tx.filter(t=>t.date.startsWith(month));
  const income=filtered.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense=filtered.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const bycat=filtered.filter(t=>t.type==='expense').reduce((a,t)=>{const k=t.category||'Outro';a[k]=(a[k]||0)+t.amount;return a;},{});

  const exportCSV=()=>{
    const header='Data,Tipo,Descrição,Valor (R$),Método/Categoria';
    const rows=filtered.map(t=>`${t.date},${t.type==='income'?'Entrada':'Saída'},"${t.desc}",${t.amount.toFixed(2)},${t.method||t.category||''}`);
    const csv='\uFEFF'+[header,...rows].join('\n');
    const a=document.createElement('a');
    a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
    a.download=`relatorio-${month}.csv`;a.click();
    showToast('CSV exportado!');
  };

  return(
    <div className="flex flex-col gap-6">
      <div className="flex items-start justify-between">
        <div><h2 className="text-2xl font-bold text-gray-900">Relatório</h2><p className="text-sm text-gray-400 mt-0.5">Fechamento mensal</p></div>
        {filtered.length>0&&<button onClick={exportCSV} className="flex items-center gap-2 border border-gray-200 text-gray-600 text-sm font-medium px-3 py-2 rounded-xl hover:bg-gray-50 transition">
          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          CSV
        </button>}
      </div>
      {months.length===0?<Card><div className="py-14 flex flex-col items-center gap-3 text-center px-6"><div className="text-4xl">📊</div><p className="text-sm font-semibold text-gray-700">Nenhum dado</p><p className="text-xs text-gray-400">Registre vendas e despesas para gerar relatórios.</p></div></Card>:(
        <>
          <Sel label="Período" value={month} onChange={e=>setMonth(e.target.value)}>
            {months.map(m=><option key={m} value={m}>{monthLabel(m)}</option>)}
          </Sel>
          <div className="grid grid-cols-3 gap-3">
            {[{label:'Entradas',val:income,color:'#16a34a'},{label:'Saídas',val:expense,color:'#ef4444'},{label:'Lucro',val:income-expense,color:income-expense>=0?'#16a34a':'#ef4444'}].map(({label,val,color})=>(
              <Card key={label} className="p-4 text-center overflow-hidden relative">
                <div className="absolute top-0 left-0 right-0 h-0.5" style={{background:color}}/>
                <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide">{label}</p>
                <p className="text-sm font-bold mt-2" style={{color}}>{R$(val)}</p>
              </Card>
            ))}
          </div>
          {Object.keys(bycat).length>0&&(
            <Card className="p-5">
              <p className="text-sm font-semibold text-gray-800 mb-3">Despesas por categoria</p>
              <div className="flex flex-col gap-2.5">
                {Object.entries(bycat).sort(([,a],[,b])=>b-a).map(([cat,val])=>(
                  <div key={cat} className="flex items-center gap-3">
                    <span className="text-xs text-gray-500 w-20 flex-shrink-0 truncate">{cat}</span>
                    <div className="flex-1 bg-gray-100 rounded-full h-1.5 overflow-hidden">
                      <div className="h-full bg-red-400 rounded-full transition-all" style={{width:`${(val/expense*100).toFixed(0)}%`}}/>
                    </div>
                    <span className="text-xs font-semibold text-gray-600 w-20 text-right">{R$(val)}</span>
                  </div>
                ))}
              </div>
            </Card>
          )}
          <Card>
            <div className="px-5 py-4 border-b border-gray-50 flex items-center justify-between">
              <p className="text-sm font-semibold text-gray-800">Todas as movimentações</p>
              <span className="text-xs text-gray-400">{filtered.length} registros</span>
            </div>
            {filtered.length===0?<div className="py-10 text-center text-sm text-gray-400">Sem registros neste mês.</div>:(
              <div className="divide-y divide-gray-50">
                {[...filtered].sort((a,b)=>b.date.localeCompare(a.date)).map(t=>(
                  <div key={t.id} className="flex items-center justify-between px-5 py-3">
                    <div className="flex items-center gap-3 min-w-0">
                      <div className={`w-7 h-7 rounded-lg flex items-center justify-center text-xs font-bold flex-shrink-0 ${t.type==='income'?'bg-green-50 text-green-600':'bg-red-50 text-red-500'}`}>{t.type==='income'?'↑':'↓'}</div>
                      <div className="min-w-0"><p className="text-sm font-medium text-gray-800 truncate">{t.desc}</p><p className="text-xs text-gray-400">{fmtDate(t.date)} · {t.method||t.category}</p></div>
                    </div>
                    <span className={`text-sm font-semibold flex-shrink-0 ml-3 ${t.type==='income'?'text-green-600':'text-red-500'}`}>{t.type==='income'?'+':'-'}{R$(t.amount)}</span>
                  </div>
                ))}
              </div>
            )}
          </Card>
        </>
      )}
    </div>
  );
};

const generatePassword=()=>{
  const c='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#$';
  return Array.from({length:12},()=>c[Math.floor(Math.random()*c.length)]).join('');
};

const AdminClients=({showToast})=>{
  const[form,setForm]=useState({email:'',password:''});
  const[creating,setCreating]=useState(false);
  const[created,setCreated]=useState(null);
  const[copied,setCopied]=useState(false);

  const genPw=()=>setForm(f=>({...f,password:generatePassword()}));

  const create=async()=>{
    if(!form.email||!form.password)return;
    if(form.password.length<8){showToast('Senha deve ter ao menos 8 caracteres.','error');return;}
    setCreating(true);
    const{data,error}=await sb.auth.signUp({email:form.email,password:form.password});
    if(error){
      if(error.message.includes('already'))showToast('Este e-mail já está cadastrado.','error');
      else showToast('Erro ao criar cliente: '+error.message,'error');
    }else{
      setCreated({email:form.email,password:form.password});

    <div className="flex flex-col gap-4">

        <div className="rounded-xl bg-green-50 border border-green-100 p-4 flex flex-col gap-3">
          <div className="flex items-center gap-2"><span className="text-green-600 text-lg">✓</span><p className="text-sm font-semibold text-green-800">Cliente criado!</p></div>
          <div className="bg-white rounded-xl p-3 font-mono text-xs flex flex-col gap-1">
            <p><span className="text-gray-400">E-mail:</span> <span className="text-gray-900 font-semibold">{created.email}</span></p>
            <p><span className="text-gray-400">Senha: </span><span className="text-gray-900 font-semibold">{created.password}</span></p>
          </div>
          <button onClick={copyCredentials} className="w-full flex items-center justify-center gap-2 bg-green-600 text-white rounded-xl py-2.5 text-sm font-semibold hover:opacity-90">
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>

const SettingsView=({brand,session,onSave,onLogout,showToast,showConfirm})=>{
  const isAdmin=session?.user?.email==='admin@gestao.com';
  const[tab,setTab]=useState('brand');
  const[form,setForm]=useState({...brand});
  const[saving,setSaving]=useState(false);
  const[pwForm,setPwForm]=useState({current:'',newPw:'',confirm:''});
  const[pwSaving,setPwSaving]=useState(false);
  const[uploading,setUploading]=useState(false);
  const fileRef=useRef();
  const COLORS=['#16a34a','#2563eb','#7c3aed','#dc2626','#ea580c','#0891b2','#be185d','#374151','#b45309','#0d9488'];

  const saveBrand=async()=>{
    setSaving(true);
    await onSave(form);
    showToast('Configurações salvas!');setSaving(false);
  };

  const changePassword=async()=>{
    if(!pwForm.newPw||pwForm.newPw!==pwForm.confirm){showToast('As senhas não coincidem.','error');return;}
    if(pwForm.newPw.length<8){showToast('Senha deve ter ao menos 8 caracteres.','error');return;}
    setPwSaving(true);
    const{error}=await sb.auth.updateUser({password:pwForm.newPw});
    if(error)showToast('Erro ao alterar senha. Tente novamente.','error');
    else{showToast('Senha alterada com sucesso!');setPwForm({current:'',newPw:'',confirm:''});}
    setPwSaving(false);
  };

  const uploadLogo=async(file)=>{
    if(!file)return;
    if(file.size>2*1024*1024){showToast('Imagem deve ter menos de 2MB.','error');return;}
    setUploading(true);
    const ext=file.name.split('.').pop();
    const path=`${session.user.id}/logo.${ext}`;
    const{error}=await sb.storage.from('logos').upload(path,file,{upsert:true});
    if(error){showToast('Erro no upload da logo.','error');setUploading(false);return;}
    const{data:{publicUrl}}=sb.storage.from('logos').getPublicUrl(path);
    setForm(f=>({...f,logo_url:publicUrl+'?t='+Date.now()}));
    showToast('Logo enviada!');setUploading(false);
  };

  const removeLogo=()=>{
    showConfirm('Remover a logo?',()=>{setForm(f=>({...f,logo_url:null}));showToast('Logo removida');});
  };

  return(
    <div className="flex flex-col gap-6">
      <div><h2 className="text-2xl font-bold text-gray-900">Configurações</h2><p className="text-sm text-gray-400 mt-0.5">Gerencie aparência, segurança e conta</p></div>
      <div className="flex gap-1 bg-gray-100 rounded-xl p-1 flex-wrap">
        {[{key:'brand',label:'Branding'},{key:'security',label:'Segurança'},{key:'account',label:'Conta'},...(isAdmin?[{key:'clients',label:'👤 Clientes'}]:[])].map(t=>(
          <button key={t.key} onClick={()=>setTab(t.key)} className={`flex-1 py-2 text-sm font-medium rounded-lg transition whitespace-nowrap ${tab===t.key?'bg-white text-gray-900 shadow-sm':'text-gray-500'}`}>{t.label}</button>
        ))}
      </div>

      {tab==='brand'&&(
        <Card className="p-6 flex flex-col gap-5">
          {/* Logo upload */}
          <div className="flex flex-col gap-2">
            <label className="text-xs font-semibold text-gray-400 uppercase tracking-wide">Logo da empresa</label>
            <div className="flex items-center gap-4">
              <div className="w-16 h-16 rounded-2xl flex-shrink-0 overflow-hidden border border-gray-200 flex items-center justify-center" style={{background:form.color}}>
                {form.logo_url?<img src={form.logo_url} alt="logo" className="w-full h-full object-cover"/>:<span className="text-2xl">{form.logo}</span>}
              </div>
              <div className="flex flex-col gap-2 flex-1">
                <input ref={fileRef} type="file" accept="image/png,image/jpeg,image/webp,image/gif" className="hidden" onChange={e=>uploadLogo(e.target.files[0])}/>
                <button onClick={()=>fileRef.current.click()} disabled={uploading} className="flex items-center justify-center gap-2 border border-gray-200 text-gray-600 rounded-xl py-2 text-sm font-medium hover:bg-gray-50 transition">
                  {uploading?<><Spin/> Enviando…</>:<><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>Upload de logo</>}
                </button>
                {form.logo_url&&<button onClick={removeLogo} className="text-xs text-red-400 hover:text-red-600 text-center">Remover logo</button>}
                <p className="text-xs text-gray-400 text-center">PNG, JPG ou WebP · Máx 2MB</p>
              </div>
            </div>
          </div>
          <Inp label="Nome da empresa" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Nome da empresa"/>
          <Inp label="Emoji (quando sem logo)" value={form.logo} onChange={e=>setForm(f=>({...f,logo:e.target.value}))} placeholder="💼"/>
          <div className="flex flex-col gap-2">
            <label className="text-xs font-semibold text-gray-400 uppercase tracking-wide">Cor principal</label>
            <div className="flex gap-2 flex-wrap">
              {COLORS.map(c=>(
                <button key={c} onClick={()=>setForm(f=>({...f,color:c}))} className="w-9 h-9 rounded-full hover:scale-110 transition-transform flex items-center justify-center" style={{background:c}}>
                  {form.color===c&&<svg className="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7"/></svg>}
                </button>
              ))}
            </div>
            <Inp label="Hex personalizado" value={form.color} onChange={e=>setForm(f=>({...f,color:e.target.value}))} placeholder="#16a34a"/>
          </div>
          <div className="rounded-xl p-4 bg-gray-50 border border-gray-100">
            <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">Pré-visualização</p>
            <div className="flex items-center gap-3 p-3 rounded-xl w-fit" style={{background:'#0f172a'}}>
              <div className="w-9 h-9 rounded-xl flex items-center justify-center overflow-hidden" style={{background:form.color}}>
                {form.logo_url?<img src={form.logo_url} alt="logo" className="w-full h-full object-cover"/>:<span className="text-lg">{form.logo}</span>}
              </div>
              <span className="font-bold text-white">{form.name||'Nome da empresa'}</span>
            </div>
          </div>
          <button onClick={saveBrand} disabled={saving} className="w-full text-white rounded-xl py-3 text-sm font-semibold hover:opacity-90 flex items-center justify-center gap-2" style={{background:form.color}}>
            {saving?<Spin white/>:'Salvar e aplicar'}
          </button>
        </Card>
      )}

      {tab==='security'&&(
        <Card className="p-6 flex flex-col gap-5">
          <div>
            <p className="text-sm font-semibold text-gray-800 mb-1">Alterar senha</p>
            <p className="text-xs text-gray-400 mb-4">Use uma senha forte com letras, números e símbolos.</p>
            <div className="flex flex-col gap-3">
              <Inp label="Nova senha" type="password" value={pwForm.newPw} onChange={e=>setPwForm(f=>({...f,newPw:e.target.value}))} placeholder="Mínimo 8 caracteres" hint={pwForm.newPw.length>0&&pwForm.newPw.length<8?'Muito curta — use ao menos 8 caracteres':''}/>
              <Inp label="Confirmar nova senha" type="password" value={pwForm.confirm} onChange={e=>setPwForm(f=>({...f,confirm:e.target.value}))} placeholder="Repita a senha"
                hint={pwForm.confirm&&pwForm.newPw!==pwForm.confirm?'As senhas não coincidem':''}/>
              <button onClick={changePassword} disabled={pwSaving||!pwForm.newPw||!pwForm.confirm} className="w-full text-white rounded-xl py-3 text-sm font-semibold hover:opacity-90 flex items-center justify-center gap-2 disabled:opacity-40" style={{background:'#374151'}}>
                {pwSaving?<Spin white/>:'Alterar senha'}
              </button>
            </div>
          </div>
          <div className="border-t border-gray-100 pt-4">
            <p className="text-sm font-semibold text-gray-800 mb-2">Informações de segurança</p>
            <div className="flex flex-col gap-2">
              {['Seus dados são armazenados com criptografia no Supabase','Cada usuário acessa apenas seus próprios dados (RLS ativo)','A conexão é sempre via HTTPS — nunca HTTP','A sessão expira automaticamente por inatividade','Nunca compartilhe sua senha com ninguém'].map((s,i)=>(
                <div key={i} className="flex items-start gap-2"><span className="text-green-500 text-sm flex-shrink-0">✓</span><p className="text-sm text-gray-600">{s}</p></div>
              ))}
            </div>
          </div>
        </Card>
      )}

      {tab==='account'&&(
        <Card className="p-6 flex flex-col gap-4">
          <div className="flex items-center gap-3 p-4 bg-gray-50 rounded-xl">
            <div className="w-10 h-10 rounded-xl flex items-center justify-center text-white text-sm font-bold" style={{background:brand.color}}>
              {session?.user?.email?.[0]?.toUpperCase()||'U'}
            </div>
            <div>
              <p className="text-sm font-semibold text-gray-800">{session?.user?.email}</p>
              <p className="text-xs text-gray-400">Usuário ativo</p>
            </div>
          </div>
          <div className="border-t border-gray-100 pt-2">
            <p className="text-sm font-semibold text-gray-800 mb-1">Sobre o sistema</p>
            <div className="flex flex-col gap-1.5 mt-2">
              <div className="flex justify-between text-sm"><span className="text-gray-500">Versão</span><span className="text-gray-800 font-medium">5.0</span></div>
              <div className="flex justify-between text-sm"><span className="text-gray-500">Banco de dados</span><span className="text-gray-800 font-medium">Supabase (PostgreSQL)</span></div>
              <div className="flex justify-between text-sm"><span className="text-gray-500">Hospedagem</span><span className="text-gray-800 font-medium">Render</span></div>
            </div>
          </div>
          <button onClick={()=>showConfirm('Sair da conta?',async()=>sb.auth.signOut())} className="w-full border border-gray-200 text-gray-600 rounded-xl py-2.5 text-sm font-medium hover:bg-gray-50 transition">Sair da conta</button>
        </Card>
      )}
      {tab==='clients'&&isAdmin&&(
        <Card className="p-6"><AdminClients showToast={showToast}/></Card>
      )}
    </div>
  );
};
const LoginScreen=()=>{
  const[email,setEmail]=useState('');
  const[pass,setPass]=useState('');
  const[err,setErr]=useState('');
  const[loading,setLoading]=useState(false);
  const login=async()=>{
    if(!email||!pass)return;
    setLoading(true);setErr('');
    const{error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){
      if(error.message.includes('Invalid'))setErr('Email ou senha incorretos. Verifique e tente novamente.');
      else if(error.message.includes('rate'))setErr('Muitas tentativas. Aguarde alguns minutos.');
      else setErr('Erro ao entrar. Tente novamente.');
    }
    setLoading(false);
  };
  return(
    <div className="min-h-screen flex items-center justify-center p-4" style={{background:'#0f172a'}}>
      <div className="w-full max-w-sm">
        <div className="text-center mb-8">
          <div className="text-5xl mb-3">💼</div>
          <h1 className="text-2xl font-bold text-white">Gestão Financeira</h1>
          <p className="text-slate-400 text-sm mt-1">Entre com seu email e senha</p>
        </div>
        <Card className="p-6 flex flex-col gap-4">
          <Inp label="Email" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="seu@email.com" onKeyDown={e=>e.key==='Enter'&&document.getElementById('pw-input').focus()}/>
          <Inp id="pw-input" label="Senha" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==='Enter'&&login()}/>
          {err&&<div className="bg-red-50 border border-red-100 rounded-xl px-4 py-2.5"><p className="text-sm text-red-600">{err}</p></div>}
          <button onClick={login} disabled={loading||!email||!pass} className="w-full text-white rounded-xl py-3 text-sm font-semibold hover:opacity-90 flex items-center justify-center gap-2 mt-1 disabled:opacity-50" style={{background:'#16a34a'}}>
            {loading?<Spin white/>:'Entrar'}
          </button>
        </Card>
      </div>
    </div>
  );
};

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const[session,setSession]=useState(null);
  const[appLoading,setAppLoading]=useState(true);
  const[dataLoading,setDataLoading]=useState(false);
  const[view,setView]=useState('dashboard');
  const[brand,setBrand]=useState(INIT_BRAND);
  const[tx,setTx]=useState([]);
  const[products,setProducts]=useState([]);
  const[losses,setLosses]=useState([]);
  const[sidebarOpen,setSidebarOpen]=useState(false);
  const[toast,setToast]=useState(null);
  const[confirm,setConfirm]=useState(null);
  const[error,setError]=useState(null);

  const showToast=useCallback((msg,type='success')=>{
    setToast({msg,type});
    setTimeout(()=>setToast(null),3000);
  },[]);

  const showConfirm=useCallback((msg,onConfirm)=>{
    setConfirm({msg,onConfirm});
  },[]);

  const loadData=async uid=>{
    setDataLoading(true);setError(null);
    try{
      const[pr,pdr,txr,lr]=await Promise.all([
        sb.from('company_profiles').select('*').eq('user_id',uid).maybeSingle(),
        sb.from('products').select('*').order('created_at'),
        sb.from('transactions').select('*').order('date',{ascending:false}),
        sb.from('losses').select('*').order('date',{ascending:false}),
      ]);
      if(pr.data)setBrand({name:pr.data.name,logo:pr.data.logo,color:pr.data.color,logo_url:pr.data.logo_url||null});
      if(pdr.data)setProducts(pdr.data);
      if(txr.data)setTx(txr.data.map(t=>({...t,desc:t.description,cat:t.category})));
      if(lr.data)setLosses(lr.data.map(l=>({...l,desc:l.description})));
    }catch(e){setError('Erro ao carregar dados. Verifique sua conexão.');}
    setDataLoading(false);
  };

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      setSession(session);
      if(session)loadData(session.user.id);
      setAppLoading(false);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
      setSession(session);
      if(session)loadData(session.user.id);
      else{setTx([]);setProducts([]);setLosses([]);setBrand(INIT_BRAND);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  const addTx=async t=>{
    const row={id:t.id,type:t.type,description:t.desc,amount:t.amount,date:t.date,method:t.method||null,category:t.cat||null,items:t.items||null,user_id:session.user.id};
    const{error}=await sb.from('transactions').insert(row);
    if(error){showToast('Erro ao salvar. Tente novamente.','error');return;}
    setTx(p=>[{...t,...row,desc:row.description,cat:row.category},...p]);
  };
  const editTx=async(id,u)=>{
    const row={description:u.desc,amount:u.amount,date:u.date,method:u.method||null,category:u.cat||null};
    const{error}=await sb.from('transactions').update(row).eq('id',id);
    if(!error)setTx(p=>p.map(t=>t.id===id?{...t,...row,desc:row.description,cat:row.category}:t));
    else showToast('Erro ao atualizar.','error');
  };
  const deleteTx=async id=>{await sb.from('transactions').delete().eq('id',id);setTx(p=>p.filter(t=>t.id!==id));};

  const addProduct=async p=>{
    const row={...p,user_id:session.user.id};
    const{error}=await sb.from('products').insert(row);
    if(error){showToast('Erro ao salvar produto.','error');return;}
    setProducts(prev=>[...prev,row]);
  };
  const editProduct=async(id,u)=>{
    const{error}=await sb.from('products').update(u).eq('id',id);
    if(!error)setProducts(p=>p.map(p=>p.id===id?{...p,...u}:p));
    else showToast('Erro ao atualizar.','error');
  };
  const deleteProduct=async id=>{await sb.from('products').delete().eq('id',id);setProducts(p=>p.filter(p=>p.id!==id));};
  const adjustStock=async(id,delta)=>{
    const p=products.find(p=>p.id===id);if(!p)return;
    const ns=Math.max(0,(p.stock||0)+delta);
    await sb.from('products').update({stock:ns}).eq('id',id);
    setProducts(p=>p.map(p=>p.id===id?{...p,stock:ns}:p));
  };

  const addLoss=async l=>{
    const row={id:l.id,description:l.desc,qty:l.qty,reason:l.reason||null,date:l.date,user_id:session.user.id};
    const{error}=await sb.from('losses').insert(row);
    if(error){showToast('Erro ao salvar perda.','error');return;}
    setLosses(p=>[{...l,...row},...p]);
  };
  const editLoss=async(id,u)=>{
    const row={description:u.desc,qty:u.qty,reason:u.reason||null,date:u.date};
    const{error}=await sb.from('losses').update(row).eq('id',id);
    if(!error)setLosses(p=>p.map(l=>l.id===id?{...l,...row,desc:row.description}:l));
    else showToast('Erro ao atualizar.','error');
  };
  const deleteLoss=async id=>{await sb.from('losses').delete().eq('id',id);setLosses(p=>p.filter(l=>l.id!==id));};

  const saveBrand=async nb=>{
    await sb.from('company_profiles').upsert({user_id:session.user.id,name:nb.name,logo:nb.logo,color:nb.color,logo_url:nb.logo_url||null});
    setBrand(nb);
  };

  const LoadingScreen=({text})=>(
    <div className="min-h-screen flex items-center justify-center flex-col gap-3" style={{background:'#f8fafc'}}>
      <div className="w-10 h-10 border-2 border-gray-200 rounded-full animate-spin" style={{borderTopColor:'#16a34a'}}/>
      {text&&<p className="text-sm text-gray-400">{text}</p>}
    </div>
  );

  if(appLoading)return<LoadingScreen/>;
  if(!session)return<LoginScreen/>;
  if(dataLoading)return<LoadingScreen text="Carregando seus dados…"/>;

  if(error)return(
    <div className="min-h-screen flex items-center justify-center flex-col gap-4 p-6" style={{background:'#f8fafc'}}>
      <span className="text-4xl">⚠️</span>
      <p className="text-sm font-semibold text-gray-700">{error}</p>
      <button onClick={()=>loadData(session.user.id)} className="px-6 py-2.5 text-white rounded-xl text-sm font-semibold" style={{background:'#16a34a'}}>Tentar novamente</button>
    </div>
  );

  const props={brand,showToast,showConfirm};
  const views={
    dashboard:<Dashboard tx={tx} products={products} brand={brand} onNav={setView}/>,
    income:<TxView type="income" tx={tx} products={products} onAdd={addTx} onEdit={editTx} onDelete={deleteTx} onDeductStock={(id,qty)=>adjustStock(id,-qty)} {...props}/>,
    expense:<TxView type="expense" tx={tx} products={products} onAdd={addTx} onEdit={editTx} onDelete={deleteTx} onDeductStock={()=>{}} {...props}/>,
    inventory:<InventoryView products={products} losses={losses} onAddProduct={addProduct} onEditProduct={editProduct} onDeleteProduct={deleteProduct} onAddLoss={addLoss} onEditLoss={editLoss} onDeleteLoss={deleteLoss} onAdjustStock={adjustStock} {...props}/>,
    email:<EmailView {...props}/>,
    report:<ReportView tx={tx} showToast={showToast}/>,
    settings:<SettingsView session={session} onSave={saveBrand} onLogout={()=>sb.auth.signOut()} {...props}/>,
  };

  return(
    <div className="min-h-screen flex" style={{background:'#f8fafc'}}>
      <OfflineBanner/>
      <Sidebar view={view} onNav={setView} brand={brand} open={sidebarOpen} onClose={()=>setSidebarOpen(false)}/>
      <div className="flex-1 lg:ml-64 flex flex-col min-h-screen">
        <header className="sticky top-0 z-20 bg-white border-b border-gray-100 px-4 py-3 flex items-center gap-3 lg:hidden">
          <button onClick={()=>setSidebarOpen(true)} className="text-gray-400 p-1 rounded-lg hover:bg-gray-100">
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <div className="flex items-center gap-2">
            {brand.logo_url?<img src={brand.logo_url} alt="logo" className="w-7 h-7 rounded-lg object-cover"/>:<div className="w-7 h-7 rounded-lg flex items-center justify-center text-sm" style={{background:brand.color}}>{brand.logo}</div>}
            <span className="font-bold text-gray-900 text-sm">{brand.name}</span>
          </div>
        </header>
        <main className="flex-1 p-4 lg:p-8 max-w-2xl w-full mx-auto">{views[view]}</main>
      </div>
      <ToastBar toast={toast}/>
      {confirm&&<Confirm msg={confirm.msg} onConfirm={()=>{confirm.onConfirm();setConfirm(null);}} onCancel={()=>setConfirm(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
