const Toast = ({toast}) => toast ? (
  <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 anim-up pointer-events-none">
    <div className={'flex items-center gap-2.5 px-5 py-3 rounded-2xl shadow-xl text-sm font-medium text-white '+(toast.type==='error'?'bg-red-600':'bg-gray-900')}>
      <span>{toast.type==='error'?'X':'OK'}</span>{toast.msg}
    </div>
  </div>
) : null;

const Offline = () => {
  const [off,setOff] = useState(!navigator.onLine);
  useEffect(() => {
    const on=()=>setOff(false), off2=()=>setOff(true);
    window.addEventListener('online',on); window.addEventListener('offline',off2);
    return () => { window.removeEventListener('online',on); window.removeEventListener('offline',off2); };
  },[]);
  return off ? <div className="fixed top-0 left-0 right-0 z-50 bg-amber-500 text-white text-xs font-semibold text-center py-2">Sem internet - alteracoes nao serao salvas</div> : null;
};

const BarChartSVG = ({data}) => {
  const max = Math.max(...data.flatMap(d=>[d.i,d.o]),1);
  const W=44,H=130,bw=10,pad=4;
  return (
    <svg width="100%" height={H} viewBox={'0 0 '+(data.length*W)+' '+H} preserveAspectRatio="xMidYMid meet">
      {data.map((d,i)=>{
        const x=i*W+pad, ih=Math.round((d.i/max)*(H-24)), oh=Math.round((d.o/max)*(H-24));
        return (
          <g key={i}>
            <rect x={x} y={H-24-ih} width={bw} height={ih||1} fill="#1a6b5c" rx={2}/>
            <rect x={x+bw+2} y={H-24-oh} width={bw} height={oh||1} fill="#fca5a5" rx={2}/>
            <text x={x+bw+1} y={H-6} textAnchor="middle" fontSize={9} fill="#9ca3af">{d.day}</text>
          </g>
        );
      })}
    </svg>
  );
};

  if(dateFrom) filtered=filtered.filter(t=>t.date>=dateFrom);
  if(dateTo) filtered=filtered.filter(t=>t.date<=dateTo);
  filtered.sort((a,b)=>b.date.localeCompare(a.date));
  const total = filtered.reduce((s,t)=>s+t.amount,0);
  const openEdit = t => setEditItem({id:t.id,desc:t.desc,amount:String(t.amount),date:t.date,cat:t.category||'Fixo',method:t.method||'PIX'});
  const saveEdit = async () => {
    if(!editItem.desc||!editItem.amount) return;
    setSaving(true);
    await onEdit(editItem.id,{desc:safe(editItem.desc),amount:Number(editItem.amount),date:editItem.date,method:isIncome?editItem.method:null,cat:isIncome?null:editItem.cat});
    toast(isIncome?'Venda atualizada':'Despesa atualizada'); setSaving(false); setEditItem(null);
  };
  const saveNew = async () => {
    if(!form.desc||!form.amount) return;
    setSaving(true);
    await onAdd({id:uid(),type,desc:safe(form.desc),amount:Number(form.amount),date:form.date,method:isIncome?form.method:null,cat:isIncome?null:form.cat});
    toast(isIncome?'Venda registrada!':'Despesa registrada!'); setModal(false); setSaving(false); setForm({desc:'',amount:'',date:today(),cat:'Fixo',method:'PIX'});
  };
  const exportCSV = () => {
    const rows = filtered.map(t=>t.date+',"'+(t.desc||'')+'",'+(t.amount.toFixed(2))+','+(t.method||t.category||''));
    const csv = 'Data,Descricao,Valor,Tipo\n'+rows.join('\n');
    const a = document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv); a.download=(isIncome?'vendas':'despesas')+'-'+today()+'.csv'; a.click();
    toast('CSV exportado!');
  };
  return (
    <div className="flex flex-col gap-6">
      <div className="flex items-start justify-between">
        <div>
          <h2 className="text-2xl font-bold text-gray-900">{isIncome?'Vendas':'Despesas'}</h2>
          <p className="text-sm text-gray-400 mt-0.5">{filtered.length+' registro'+(filtered.length!==1?'s':'')+' . '}<span className={'font-semibold '+(isIncome?'text-green-600':'text-red-500')}>{fmt(total)}</span></p>
        </div>
        <div className="flex gap-2">
          <button onClick={exportCSV} title="Exportar CSV" className="p-2.5 border border-gray-200 text-gray-500 rounded-xl hover:bg-gray-50 transition">
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          </button>
          <button onClick={()=>setModal(true)} className="flex items-center gap-2 text-white text-sm font-semibold px-4 py-2.5 rounded-xl hover:opacity-90" style={{background:brand.color}}>
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
            {isIncome?'Nova Venda':'Nova Despesa'}
          </button>
        </div>
      </div>
      <Card className="p-4 flex flex-col gap-3">
        <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide">Filtros</p>
        <div className="grid grid-cols-1 gap-2 sm:grid-cols-3">
          <div className="relative">
            <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar descricao..." className="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-xl focus:outline-none focus:border-gray-400 bg-white"/>
          </div>
          <Inp type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} placeholder="Data inicial"/>
          <Inp type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} placeholder="Data final"/>
        </div>
        {(search||dateFrom||dateTo) && <button onClick={()=>{setSearch('');setDateFrom('');setDateTo('');}} className="text-xs text-gray-400 hover:text-gray-600 w-fit">Limpar filtros</button>}
      </Card>
      <Card>
        {filtered.length===0
          ? <Empty icon={isIncome?'💰':'📤'} title={isIncome?'Nenhuma venda':'Nenhuma despesa'} sub={isIncome?'Registre vendas com multiplos itens e calculo automatico.':'Registre aluguel, energia, fornecedores e outras saidas.'}/>
          : <div className="divide-y divide-gray-50">{filtered.map(t=>(
              <div key={t.id} className="flex items-center justify-between px-4 py-3.5 gap-3">
                <div className="flex items-center gap-3 min-w-0 flex-1">
                  <div className={'w-8 h-8 rounded-xl flex items-center justify-center text-sm font-bold flex-shrink-0 '+(isIncome?'bg-green-50 text-green-600':'bg-red-50 text-red-500')}>{isIncome?'UP':'DOWN'}</div>
                  <div className="min-w-0"><p className="text-sm font-medium text-gray-800 truncate">{t.desc}</p><p className="text-xs text-gray-400">{fmtDate(t.date)+' · '+(t.method||t.category||'')+(t.items&&t.items.length>1?' · '+t.items.length+' itens':'')+(t.registered_by?' · '+t.registered_by:'')}</p></div>
                </div>
                <div className="flex items-center gap-1 flex-shrink-0">
                  <span className={'text-sm font-semibold mr-1 '+(isIncome?'text-green-600':'text-red-500')}>{(isIncome?'+':'-')+fmt(t.amount)}</span>
                  <EditBtn onClick={()=>openEdit(t)}/>
                  <DelBtn onClick={()=>confirm('Excluir este registro?',async()=>{await onDelete(t.id);toast('Removido');})}/>
                </div>
              </div>
            ))}</div>
        }
      </Card>
      {modal && (isIncome
        ? <SaleForm products={products} brand={brand} onSave={async sale=>{await onAdd(sale);if(sale.items)sale.items.forEach(it=>{const p=products.find(p=>p.name===it.desc);if(p&&p.stock!=null)onDeductStock(p.id,it.qty);});toast('Venda registrada!');}} onClose={()=>setModal(false)}/>
        : <Modal title="Nova Despesa" onClose={()=>setModal(false)} onSave={saveNew} saving={saving}>
            <Inp label="Descricao" value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))} placeholder="Ex: Aluguel, Energia..."/>
            <Inp label="Valor (R$)" type="number" step="0.01" min="0" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} placeholder="0,00"/>
            <Inp label="Data" type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>
            <Sel label="Categoria" value={form.cat} onChange={e=>setForm(f=>({...f,cat:e.target.value}))}>{cats.map(c=><option key={c}>{c}</option>)}</Sel>
          </Modal>
      )}
      {editItem && (
        <Modal title={isIncome?'Editar Venda':'Editar Despesa'} onClose={()=>setEditItem(null)} onSave={saveEdit} saving={saving} saveLabel="Salvar alteracoes">
          <Inp label="Descricao" value={editItem.desc} onChange={e=>setEditItem(f=>({...f,desc:e.target.value}))}/>
          <Inp label="Valor (R$)" type="number" step="0.01" min="0" value={editItem.amount} onChange={e=>setEditItem(f=>({...f,amount:e.target.value}))}/>
          <Inp label="Data" type="date" value={editItem.date} onChange={e=>setEditItem(f=>({...f,date:e.target.value}))}/>
          {isIncome
            ? <Sel label="Pagamento" value={editItem.method} onChange={e=>setEditItem(f=>({...f,method:e.target.value}))}>{['PIX','Dinheiro','Cartao de Debito','Cartao de Credito','Boleto','Transferencia'].map(m=><option key={m}>{m}</option>)}</Sel>
            : <Sel label="Categoria" value={editItem.cat} onChange={e=>setEditItem(f=>({...f,cat:e.target.value}))}>{cats.map(c=><option key={c}>{c}</option>)}</Sel>
          }
        </Modal>
      )}
    </div>
  );
};

const InventoryView = ({products,losses,onAddProduct,onEditProduct,onDeleteProduct,onAddLoss,onEditLoss,onDeleteLoss,onAdjustStock,brand,toast,confirm}) => {
  const [tab,setTab] = useState('products');
  const [search,setSearch] = useState('');
  const [collapsed,setCollapsed] = useState(new Set());
  const [pm,setPm] = useState(false);
  const [editP,setEditP] = useState(null);
  const [lm,setLm] = useState(false);
  const [editL,setEditL] = useState(null);
  const [sm,setSm] = useState(null);
  const [pf,setPf] = useState({name:'',category:'',price:'',cost:'',stock:''});
  const [lf,setLf] = useState({desc:'',qty:'1',reason:'',date:today()});
  const [sq,setSq] = useState('1');
  const [saving,setSaving] = useState(false);
  const saveProd = async () => {
    if(!pf.name||!pf.price) return;
    setSaving(true);
    await onAddProduct({id:'P'+String(Date.now()).slice(-6),name:safe(pf.name),category:pf.category||null,price:Number(pf.price),cost:pf.cost?Number(pf.cost):null,stock:pf.stock!==''?Number(pf.stock):null});
    toast('Produto adicionado!'); setSaving(false); setPm(false); setPf({name:'',category:'',price:'',cost:'',stock:''});
  };
  const saveEditP = async () => {
    if(!editP.name||!editP.price) return;
    setSaving(true);
    await onEditProduct(editP.id,{name:safe(editP.name),category:editP.category||null,price:Number(editP.price),cost:editP.cost?Number(editP.cost):null,stock:editP.stock!==''&&editP.stock!=null?Number(editP.stock):null});
    toast('Produto atualizado'); setSaving(false); setEditP(null);
  };
  const saveLoss = async () => {
    if(!lf.desc||!lf.qty) return;
    setSaving(true);
    await onAddLoss({id:uid(),desc:safe(lf.desc),qty:Number(lf.qty),reason:lf.reason,date:lf.date});
    const p=products.find(p=>p.name===lf.desc); if(p&&p.stock!=null) await onAdjustStock(p.id,-Number(lf.qty));
    toast('Perda registrada'); setSaving(false); setLm(false); setLf({desc:'',qty:'1',reason:'',date:today()});
  };
  const saveEditL = async () => {
    if(!editL.desc||!editL.qty) return;
    setSaving(true);
    await onEditLoss(editL.id,{desc:safe(editL.desc),qty:Number(editL.qty),reason:editL.reason,date:editL.date});
    toast('Perda atualizada'); setSaving(false); setEditL(null);
  };
  const saveStock = async () => {
    if(!sq||!sm) return;
    setSaving(true);
    await onAdjustStock(sm,Number(sq));
    toast('Estoque atualizado!'); setSaving(false); setSm(null); setSq('1');
  };
  const toggleCat = cat => setCollapsed(p=>{const n=new Set(p);n.has(cat)?n.delete(cat):n.add(cat);return n;});
  const disp = search.trim() ? products.filter(p=>[p.name,p.category,p.id].filter(Boolean).some(v=>v.toLowerCase().includes(search.toLowerCase()))) : products;
  const grouped = Object.entries(disp.reduce((a,p)=>{const k=p.category||'Sem categoria';(a[k]=a[k]||[]).push(p);return a;},{})).sort(([a],[b])=>a==='Sem categoria'?1:b==='Sem categoria'?-1:a.localeCompare(b));
  const sp = sm ? products.find(p=>p.id===sm) : null;
  return (
    <div className="flex flex-col gap-6">
      <div className="flex items-start justify-between">
        <div><h2 className="text-2xl font-bold text-gray-900">Estoque</h2><p className="text-sm text-gray-400 mt-0.5">{products.length+' item'+(products.length!==1?'s':'')}</p></div>
        <div className="flex gap-2">
          {tab==='products' && <button onClick={()=>setPm(true)} className="flex items-center gap-2 text-white text-sm font-semibold px-4 py-2.5 rounded-xl hover:opacity-90" style={{background:brand.color}}><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>Adicionar</button>}
          {tab==='losses' && <button onClick={()=>setLm(true)} className="flex items-center gap-2 bg-red-600 text-white text-sm font-semibold px-4 py-2.5 rounded-xl hover:opacity-90"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>Perda</button>}
        </div>
      </div>
      <div className="flex gap-1 bg-gray-100 rounded-xl p-1">
        {[{key:'products',label:'Produtos e Servicos'},{key:'losses',label:'Perdas'}].map(t=>(
          <button key={t.key} onClick={()=>setTab(t.key)} className={'flex-1 py-2 text-sm font-medium rounded-lg transition '+(tab===t.key?'bg-white text-gray-900 shadow-sm':'text-gray-500')}>{t.label}</button>
        ))}
      </div>
      {tab==='products' && (
        <Card>
          <div className="px-5 py-3 border-b border-gray-50">
            <div className="relative"><svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por nome ou categoria..." className="w-full pl-9 pr-3 py-2 text-sm bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:border-gray-300"/></div>
          </div>
          {disp.length===0
            ? <Empty icon="📦" title="Nenhum item" sub="Adicione produtos ou servicos com categoria, custo e estoque."/>
            : grouped.map(([cat,items])=>(
                <div key={cat}>
                  <button onClick={()=>toggleCat(cat)} className="w-full flex items-center justify-between px-5 py-2.5 bg-gray-50 hover:bg-gray-100 transition border-b border-gray-100">
                    <div className="flex items-center gap-2">
                      <svg className={'w-3.5 h-3.5 text-gray-400 transition-transform '+(collapsed.has(cat)?'-rotate-90':'')} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/></svg>
                      <span className="text-xs font-semibold text-gray-500 uppercase tracking-wide">{cat}</span>
                    </div>
                    <span className="text-xs text-gray-400">{items.length+' '+(items.length===1?'item':'itens')}</span>
                  </button>
                  {!collapsed.has(cat) && (
                    <div className="divide-y divide-gray-50">{items.map(p=>(
                      <div key={p.id} className="px-4 py-3.5 flex items-center justify-between gap-3">
                        <div className="min-w-0 flex-1">
                          <p className="text-sm font-medium text-gray-800">{p.name}</p>
                          <div className="flex items-center gap-3 mt-0.5 flex-wrap">
                            <span className="text-xs text-gray-400">{'Venda: '+fmt(p.price)}</span>{p.registered_by&&<span className="text-xs text-gray-400">{'· por '+p.registered_by}</span>}
                            {p.cost!=null && <><span className="text-xs text-gray-400">{'Custo: '+fmt(p.cost)}</span><span className="text-xs text-green-600 font-medium">{'Margem: '+(((p.price-p.cost)/p.price)*100).toFixed(0)+'%'}</span></>}
                          </div>
                        </div>
                        <div className="flex items-center gap-1 flex-shrink-0">
                          {p.stock!=null && <button onClick={()=>{setSm(p.id);setSq('1');}} className={'text-xs font-semibold px-2.5 py-1 rounded-lg mr-1 '+(p.stock<=0?'bg-red-50 text-red-600':p.stock<=5?'bg-amber-50 text-amber-700':'bg-green-50 text-green-700')}>{p.stock<=0?'Esgotado':p.stock+' un'}</button>}
                          <EditBtn onClick={()=>setEditP({id:p.id,name:p.name,category:p.category||'',price:String(p.price),cost:p.cost!=null?String(p.cost):'',stock:p.stock!=null?String(p.stock):''})}/>
                          <DelBtn onClick={()=>confirm('Excluir "'+p.name+'"?',async()=>{await onDeleteProduct(p.id);toast('Produto removido');})}/>
                        </div>
                      </div>
                    ))}</div>
                  )}
                </div>
              ))
          }
        </Card>
      )}
      {tab==='losses' && (
        <Card>
          {losses.length===0
            ? <Empty icon="⚠️" title="Nenhuma perda" sub="Registre produtos vencidos, cancelados ou danificados."/>
            : <div className="divide-y divide-gray-50">{[...losses].sort((a,b)=>b.date.localeCompare(a.date)).map(l=>(
                <div key={l.id} className="flex items-center justify-between px-4 py-3.5 gap-3">
                  <div className="flex items-center gap-3 min-w-0 flex-1">
                    <div className="w-8 h-8 rounded-xl bg-amber-50 text-amber-600 flex items-center justify-center text-sm flex-shrink-0">!</div>
                    <div className="min-w-0"><p className="text-sm font-medium text-gray-800">{l.qty+'x '+l.desc}</p><p className="text-xs text-gray-400">{fmtDate(l.date)+(l.reason?' . '+l.reason:'')}</p></div>
                  </div>
                  <div className="flex items-center gap-1 flex-shrink-0">
                    <EditBtn onClick={()=>setEditL({id:l.id,desc:l.desc,qty:String(l.qty),reason:l.reason||'',date:l.date})}/>
                    <DelBtn onClick={()=>confirm('Excluir esta perda?',async()=>{await onDeleteLoss(l.id);toast('Perda removida');})}/>
                  </div>
                </div>
              ))}</div>
          }
        </Card>
      )}
      {pm && <Modal title="Novo Produto ou Servico" onClose={()=>setPm(false)} onSave={saveProd} saving={saving}>
        <Inp label="Nome *" value={pf.name} onChange={e=>setPf(f=>({...f,name:e.target.value}))} placeholder="Ex: Corte de cabelo, Camiseta P..."/>
        <Inp label="Categoria" value={pf.category} onChange={e=>setPf(f=>({...f,category:e.target.value}))} placeholder="Ex: Servicos, Roupas, Alimentos..."/>
        <div className="grid grid-cols-2 gap-3">
          <Inp label="Preco de venda *" type="number" step="0.01" min="0" value={pf.price} onChange={e=>setPf(f=>({...f,price:e.target.value}))} placeholder="0,00"/>
          <Inp label="Custo" type="number" step="0.01" min="0" value={pf.cost} onChange={e=>setPf(f=>({...f,cost:e.target.value}))} placeholder="0,00"/>
        </div>
        <Inp label="Estoque inicial (em branco para servicos)" type="number" min="0" value={pf.stock} onChange={e=>setPf(f=>({...f,stock:e.target.value}))} placeholder="Ex: 50"/>
      </Modal>}
      {editP && <Modal title="Editar Produto" onClose={()=>setEditP(null)} onSave={saveEditP} saving={saving} saveLabel="Salvar alteracoes">
        <Inp label="Nome *" value={editP.name} onChange={e=>setEditP(f=>({...f,name:e.target.value}))}/>
        <Inp label="Categoria" value={editP.category} onChange={e=>setEditP(f=>({...f,category:e.target.value}))} placeholder="Ex: Servicos, Roupas..."/>
        <div className="grid grid-cols-2 gap-3">
          <Inp label="Preco de venda *" type="number" step="0.01" min="0" value={editP.price} onChange={e=>setEditP(f=>({...f,price:e.target.value}))}/>
          <Inp label="Custo" type="number" step="0.01" min="0" value={editP.cost} onChange={e=>setEditP(f=>({...f,cost:e.target.value}))} placeholder="Opcional"/>
        </div>
        <Inp label="Estoque atual" type="number" min="0" value={editP.stock} onChange={e=>setEditP(f=>({...f,stock:e.target.value}))} placeholder="Em branco para servicos"/>
      </Modal>}
      {lm && <Modal title="Registrar Perda" onClose={()=>setLm(false)} onSave={saveLoss} color="#dc2626" saving={saving}>
        <div className="flex flex-col gap-1.5"><label className="text-xs font-semibold text-gray-400 uppercase tracking-wide">Produto</label><PSearch products={products} value={lf.desc} onSelect={p=>setLf(f=>({...f,desc:p.name}))} onChange={v=>setLf(f=>({...f,desc:v}))} placeholder="Buscar ou digitar"/></div>
        <Inp label="Quantidade" type="number" min="1" value={lf.qty} onChange={e=>setLf(f=>({...f,qty:e.target.value}))}/>
        <Inp label="Motivo (opcional)" value={lf.reason} onChange={e=>setLf(f=>({...f,reason:e.target.value}))} placeholder="Ex: Vencimento, Avaria..."/>
        <Inp label="Data" type="date" value={lf.date} onChange={e=>setLf(f=>({...f,date:e.target.value}))}/>
      </Modal>}
      {editL && <Modal title="Editar Perda" onClose={()=>setEditL(null)} onSave={saveEditL} color="#dc2626" saving={saving} saveLabel="Salvar alteracoes">
        <div className="flex flex-col gap-1.5"><label className="text-xs font-semibold text-gray-400 uppercase tracking-wide">Produto</label><PSearch products={products} value={editL.desc} onSelect={p=>setEditL(f=>({...f,desc:p.name}))} onChange={v=>setEditL(f=>({...f,desc:v}))} placeholder="Buscar ou digitar"/></div>
        <Inp label="Quantidade" type="number" min="1" value={editL.qty} onChange={e=>setEditL(f=>({...f,qty:e.target.value}))}/>
        <Inp label="Motivo" value={editL.reason} onChange={e=>setEditL(f=>({...f,reason:e.target.value}))} placeholder="Ex: Vencimento..."/>
        <Inp label="Data" type="date" value={editL.date} onChange={e=>setEditL(f=>({...f,date:e.target.value}))}/>
      </Modal>}
      {sm && sp && <Modal title={'Repor estoque: '+sp.name} onClose={()=>setSm(null)} onSave={saveStock} saving={saving} saveLabel="Adicionar">
        <div className="rounded-xl bg-gray-50 px-4 py-3 flex items-center justify-between"><span className="text-sm text-gray-600">Estoque atual</span><span className="text-lg font-bold">{sp.stock+' un.'}</span></div>
        <Inp label="Quantidade a adicionar" type="number" min="1" value={sq} onChange={e=>setSq(e.target.value)} placeholder="Ex: 10"/>
        {sq&&Number(sq)>0 && <p className="text-xs text-gray-400 text-center">{'Novo estoque: '+((sp.stock||0)+Number(sq))+' un.'}</p>}
      </Modal>}
    </div>
  );
};

const ReportView = ({tx,toast}) => {

const getGhToken = () => localStorage.getItem('nancia_gh_token') || '';
const GH_REPO  = 'AsafeTork/gestao-financeira';

const triggerApkBuild = async (clientName, logoUrl, primaryColor) => {
  const res = await fetch(
    `https://api.github.com/repos/${GH_REPO}/actions/workflows/build-apk.yml/dispatches`,
    {
      method: 'POST',
      headers: {
        Authorization: `token ${getGhToken()}`,
        'Content-Type': 'application/json',
        Accept: 'application/vnd.github.v3+json',
      },
      body: JSON.stringify({
        ref: 'main',
        inputs: {
          client_name: clientName || 'Financia',
          logo_url: logoUrl || '',
          primary_color: primaryColor || '#002f59',
        },
      }),
    }
  );
  return res.status === 204;
};

const AdminPanel = ({toast}) => {

  const [creating, setCreating] = useState(false);
  const [uploading, setUploading] = useState(false);
  const [building, setBuilding]   = useState(false);
  const [created, setCreated]     = useState(null);
  const [copied, setCopied]       = useState(false);
  const logoRef = React.useRef();

  const extractColors = img => {
    try {
      const c = document.createElement('canvas');
      c.width = 50; c.height = 50;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0, 50, 50);
      const data = ctx.getImageData(0, 0, 50, 50).data;
      const buckets = {};
      for (let i = 0; i < data.length; i += 4) {
        if (data[i+3] < 128) continue;
        const r = Math.round(data[i]/32)*32;
        const g = Math.round(data[i+1]/32)*32;
        const b = Math.round(data[i+2]/32)*32;
        if (r>230&&g>230&&b>230) continue;
        const key = `${r},${g},${b}`;
        buckets[key] = (buckets[key]||0)+1;
      }
      const sorted = Object.entries(buckets).sort((a,b)=>b[1]-a[1]).slice(0,5);
      const hexColors = sorted.map(([k])=>{
        const [r,g,b]=k.split(',').map(Number);
        return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
      });
      if(hexColors.length) setForm(f=>({...f, colors:hexColors, primaryColor:hexColors[0]}));
    } catch(_) {}
  };

  const uploadLogo = async file => {
    if (!file) return;
    setUploading(true);
    const ext = file.name.split('.').pop();
    const path = 'client-logos/' + Date.now() + '.' + ext;
    const {error} = await sb.storage.from('logos').upload(path, file, {upsert:true});
    if (error) { toast('Erro no upload.','error'); setUploading(false); return; }
    const {data:{publicUrl}} = sb.storage.from('logos').getPublicUrl(path);
    const url = publicUrl + '?t=' + Date.now();
    setForm(f => ({...f, logoUrl: url}));
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => extractColors(img);
    img.src = url;
    setUploading(false);
    toast('Logo enviado!');
  };

  const create = async () => {
    if (!form.email || !form.password) return;
    if (form.password.length < 8) { toast('Senha minimo 8 caracteres.','error'); return; }
    setCreating(true);
    const {error} = await sb.auth.signUp({email:form.email, password:form.password});
    if (error) {
      toast(error.message.includes('already') ? 'E-mail ja cadastrado.' : 'Erro: '+error.message, 'error');
      setCreating(false); return;
    }
    toast('Conta criada! Gerando APK personalizado...');
    setBuilding(true);
    const ok = await triggerApkBuild(form.companyName, form.logoUrl, form.primaryColor);
    setBuilding(false);
    setCreated({
      email: form.email,
      password: form.password,
      companyName: form.companyName,
      logoUrl: form.logoUrl,

    setForm({email:'', password:'', companyName:'', logoUrl:'', primaryColor:'#002f59', colors:['#002f59']});

    setCopied(true); setTimeout(()=>setCopied(false),2500);

  };

      <div>

      </div>

        <p className="text-xs font-bold text-gray-500 uppercase tracking-wider">Identidade visual</p>
        <Inp label="Nome da empresa" value={form.companyName} onChange={e=>setForm(f=>({  ...f,companyName:e.target.value}))} placeholder="Ex: Padaria do Joao"/>

        {/* Upload logo */}

          <label className="text-xs font-semibold text-gray-400 uppercase tracking-wide">Logo</label>
          <div className="flex items-center gap-3">
            <div className="w-14 h-14 rounded-xl flex items-center justify-center border-2 border-dashed border-gray-200 overflow-hidden flex-shrink-0" style={{background:form.primaryColor+'18'}}>
              {form.logoUrl
                ? <img src={form.logoUrl} className="w-full h-full object-contain p-1"/>
                : <span className="text-2xl">🏢</span>}
            </div>
            <div className="flex flex-col gap-1.5 flex-1">
              <input ref={logoRef} type="file" accept="image/*" className="hidden" onChange={e=>uploadLogo(e.target.files[0])}/>

// ── IndexedDB local (Dexie) ──────────────────────────────────────────────────
const ldb = new Dexie('gestao_offline');
ldb.version(1).stores({
  transactions: 'id, user_id, date, _synced, _deleted, _updated_at',
  products:     'id, user_id, category, _synced, _deleted, _updated_at',
  losses:       'id, user_id, date, _synced, _deleted, _updated_at',
  profiles:     'user_id, _synced, _updated_at',
  meta:         'key',
});
ldb.version(2).stores({
  transactions: 'id, user_id, date, _synced, _deleted, _updated_at, registered_by',
  products:     'id, user_id, category, _synced, _deleted, _updated_at, registered_by',
  losses:       'id, user_id, date, _synced, _deleted, _updated_at, registered_by',
  profiles:     'user_id, _synced, _updated_at',
  meta:         'key',
});

const now = () => new Date().toISOString();

const getLastSync = async () => {
  const r = await ldb.meta.get('last_sync');
  return r ? r.val : '1970-01-01T00:00:00Z';
};
const setLastSync = ts => ldb.meta.put({ key: 'last_sync', val: ts });

// Mapeia linha Supabase → local
const toLocal = (row, extra = {}) => ({
  ...row,
  _synced: 1,
  _deleted: 0,
  _updated_at: row.updated_at || row.created_at || now(),
  ...extra,
});

// Sincronização bidirecional por tabela
const syncTable = async (uid, table, ldbTable, mapLocal, mapRemote) => {
  if (!navigator.onLine) return;
  const lastSync = await getLastSync();

  // Push: locais não sincronizados
  const unsynced = await ldbTable.where('user_id').equals(uid).and(r=>r._synced===0).toArray();
  for (const row of unsynced) {
    const { _synced, _deleted, _updated_at, ...clean } = row;
    if (_deleted) {
      await sb.from(table).delete().eq('id', row.id);
    } else {
      await sb.from(table).upsert(mapRemote(clean));
    }
    await ldbTable.update(row.id, { _synced: 1 });
  }

  // Pull: remotos alterados desde o último sync
  const { data } = await sb.from(table).select('*')
    .eq('user_id', uid)
    .gte('updated_at', lastSync)
    .limit(1000);
  for (const row of data || []) {
    const existing = await ldbTable.get(row.id);
    if (!existing || existing._synced === 1) {
      await ldbTable.put(toLocal(row, mapLocal(row)));
    }
  }
};

const syncProfiles = async uid => {
  if (!navigator.onLine) return;
  const unsynced = await ldb.profiles.where('user_id').equals(uid).and(r=>r._synced===0).toArray();
  for (const row of unsynced) {
    const { _synced, _deleted, _updated_at, ...clean } = row;
    await sb.from('company_profiles').upsert(clean);
    await ldb.profiles.update(uid, { _synced: 1 });
  }
  const { data } = await sb.from('company_profiles').select('*').eq('user_id', uid).maybeSingle();
  if (data) await ldb.profiles.put(toLocal(data));
};

const syncAll = async uid => {
  if (!uid || !navigator.onLine) return false;
  try {
    const ts = now();
    await Promise.all([
      syncTable(uid, 'transactions', ldb.transactions,
        r => ({ desc: r.description, cat: r.category }),
        r => ({ ...r, description: r.desc||r.description, category: r.cat||r.category })
      ),
      syncTable(uid, 'products', ldb.products, ()=>{}, r=>r),
      syncTable(uid, 'losses', ldb.losses,
        r => ({ desc: r.description }),
        r => ({ ...r, description: r.desc||r.description })
      ),
      syncProfiles(uid),
    ]);
    await setLastSync(ts);
    return true;
  } catch(e) { return false; }
};

const SyncBadge = ({ status }) => {
  if (status === 'idle') return null;
  const cfg = {
    syncing: { bg:'#2563eb', text:'Sincronizando...', icon:'↻' },
    ok:      { bg:'#1a6b5c', text:'Sincronizado',     icon:'✓' },
    error:   { bg:'#dc2626', text:'Sem internet',     icon:'⚠' },
  }[status];
  return (
    <div style={{position:'fixed',top:8,right:8,zIndex:9999,background:cfg.bg,color:'#fff',borderRadius:20,padding:'4px 12px',fontSize:12,fontWeight:600,display:'flex',alignItems:'center',gap:4,boxShadow:'0 2px 8px rgba(0,0,0,0.2)'}}>
      <span style={{display:'inline-block',animation:status==='syncing'?'spin 1s linear infinite':'none'}}>{cfg.icon}</span>
      {cfg.text}
    </div>
  );
};
function App() {
  const [session,setSession] = useState(null);
  const [syncStatus,setSyncStatus] = useState('idle'); // idle | syncing | ok | error
  const uidRef = React.useRef(null);
  const [isAdminDB,setIsAdminDB] = useState(false);
  const [appLoading,setAppLoading] = useState(true);
  const [dataLoading,setDataLoading] = useState(false);
  const [view,setView] = useState('dashboard');
  const [brand,setBrand] = useState(INIT_BRAND);
  const [tx,setTx] = useState([]);
  const [products,setProducts] = useState([]);
  const [losses,setLosses] = useState([]);
  const [sidebarOpen,setSidebarOpen] = useState(false);
  const [toastData,setToastData] = useState(null);
  const [confirmData,setConfirmData] = useState(null);
  const [dataError,setDataError] = useState(null);

  const toast = useCallback((msg,type='success') => {
    setToastData({msg,type});
    setTimeout(()=>setToastData(null),3000);
  },[]);
  const confirm = useCallback((msg,onOk) => setConfirmData({msg,onOk}),[]);

  const loadFromLocal = async uid => {
    const [profile, prods, txs, lss, roleRes] = await Promise.all([
      ldb.profiles.get(uid),
      ldb.products.where('user_id').equals(uid).filter(r=>!r._deleted).sortBy('created_at'),
      ldb.transactions.where('user_id').equals(uid).filter(r=>!r._deleted).sortBy('date'),
      ldb.losses.where('user_id').equals(uid).filter(r=>!r._deleted).sortBy('date'),
      sb.from('user_roles').select('role').eq('user_id', uid).maybeSingle(),
    ]);
    if (profile) setBrand({ name:profile.name, logo:profile.logo, color:profile.color, logo_url:profile.logo_url||null });
    setProducts(prods);
    setTx(txs.map(t => ({ ...t, desc:t.description||t.desc, cat:t.category||t.cat })));
    setLosses(lss.map(l => ({ ...l, desc:l.description||l.desc })));
    setIsAdminDB(roleRes?.data?.role === 'admin');
  };

  const loadData = async uid => {
    uidRef.current = uid;
    setDataLoading(true); setDataError(null);
    try {
      // Carrega local primeiro (instantâneo)
      await loadFromLocal(uid);
      setDataLoading(false);
      // Sincroniza em background
      if (navigator.onLine) {
        setSyncStatus('syncing');
        const ok = await syncAll(uid);
        if (ok) {
          await loadFromLocal(uid);
          setSyncStatus('ok');
          setTimeout(() => setSyncStatus('idle'), 3000);
        } else {
          setSyncStatus('error');
        }
      }
    } catch(e) {
      // Se local vazio e offline, tenta Supabase
      if (navigator.onLine) {
        try {
          const [pr,pdr,txr,lr,roleRes] = await Promise.all([
            sb.from('company_profiles').select('*').eq('user_id',uid).maybeSingle(),
            sb.from('products').select('*').order('created_at').limit(500),
            sb.from('transactions').select('*').order('date',{ascending:false}).limit(500),
            sb.from('losses').select('*').order('date',{ascending:false}).limit(500),
            sb.from('user_roles').select('role').eq('user_id',uid).maybeSingle(),
          ]);
          if(pr.data){ const p=pr.data; setBrand({name:p.name,logo:p.logo,color:p.color,logo_url:p.logo_url||null}); await ldb.profiles.put(toLocal(p)); }
          if(pdr.data){ setProducts(pdr.data); await ldb.products.bulkPut(pdr.data.map(r=>toLocal(r,{user_id:uid}))); }
          if(txr.data){ const mapped=txr.data.map(t=>({...t,desc:t.description,cat:t.category})); setTx(mapped); await ldb.transactions.bulkPut(txr.data.map(r=>toLocal(r,{user_id:uid,desc:r.description,cat:r.category}))); }
          if(lr.data){ const mapped=lr.data.map(l=>({...l,desc:l.description})); setLosses(mapped); await ldb.losses.bulkPut(lr.data.map(r=>toLocal(r,{user_id:uid,desc:r.description}))); }
          setIsAdminDB(roleRes?.data?.role==='admin');
          await setLastSync(now());
        } catch(e2){ setDataError('Erro ao carregar dados.'); }
      } else {
        setDataError('Sem conexao e sem dados locais. Conecte-se pelo menos uma vez.');
      }
    }
    setDataLoading(false);
  };

  useEffect(() => {
    sb.auth.getSession().then(({data:{session}}) => {
      setSession(session);
      if(session) loadData(session.user.id);
      setAppLoading(false);
    });
    const {data:{subscription}} = sb.auth.onAuthStateChange((_,session) => {
      setSession(session);
      if(session) loadData(session.user.id);
      else { setTx([]); setProducts([]); setLosses([]); setBrand(INIT_BRAND); }
    });
    const onOnline = async () => {
      const uid = uidRef.current;
      if (!uid) return;
      setSyncStatus('syncing');
      const ok = await syncAll(uid);
      if (ok) { await loadFromLocal(uid); setSyncStatus('ok'); setTimeout(()=>setSyncStatus('idle'),3000); }
      else setSyncStatus('error');
    };
    window.addEventListener('online', onOnline);
    return () => { subscription.unsubscribe(); window.removeEventListener('online', onOnline); };
  },[]);

  const addTx = async t => {
    const uid = session.user.id;
    const rb = session.user.user_metadata?.name || session.user.email;
    const row = { id:t.id, type:t.type, description:t.desc, amount:t.amount, date:t.date, method:t.method||null, category:t.cat||null, items:t.items||null, user_id:uid, registered_by:rb, updated_at:now(), _synced:0, _deleted:0, _updated_at:now(), desc:t.desc, cat:t.cat||null };
    await ldb.transactions.put(row);
    setTx(p=>[row,...p]);
    if (navigator.onLine) { const {error}=await sb.from('transactions').upsert({id:row.id,type:row.type,description:row.description,amount:row.amount,date:row.date,method:row.method,category:row.category,items:row.items,user_id:uid,registered_by:rb,updated_at:row.updated_at}); if(!error) await ldb.transactions.update(row.id,{_synced:1}); }
  };
  const editTx = async (id,u) => {
    const upd = { description:u.desc, amount:u.amount, date:u.date, method:u.method||null, category:u.cat||null, updated_at:now(), _synced:0, _updated_at:now(), desc:u.desc, cat:u.cat||null };
    await ldb.transactions.update(id, upd);
    setTx(p=>p.map(t=>t.id===id?{...t,...upd}:t));
    if (navigator.onLine) { const {error}=await sb.from('transactions').update({description:upd.description,amount:upd.amount,date:upd.date,method:upd.method,category:upd.category,updated_at:upd.updated_at}).eq('id',id); if(!error) await ldb.transactions.update(id,{_synced:1}); }
  };
  const deleteTx = async id => {
    await ldb.transactions.update(id, { _deleted:1, _synced:0, _updated_at:now() });
    setTx(p=>p.filter(t=>t.id!==id));
    if (navigator.onLine) { await sb.from('transactions').delete().eq('id',id); await ldb.transactions.delete(id); }
  };

  const addProduct = async p => {
    const uid = session.user.id;
    const rb = session.user.user_metadata?.name || session.user.email;
    const row = { ...p, user_id:uid, registered_by:rb, updated_at:now(), _synced:0, _deleted:0, _updated_at:now() };
    await ldb.products.put(row);
    setProducts(prev=>[...prev,row]);
    if (navigator.onLine) { const {error}=await sb.from('products').upsert({id:row.id,name:row.name,category:row.category,price:row.price,cost:row.cost,stock:row.stock,user_id:uid,registered_by:rb,updated_at:row.updated_at}); if(!error) await ldb.products.update(row.id,{_synced:1}); }
  };
  const editProduct = async (id,u) => {
    const upd = { ...u, updated_at:now(), _synced:0, _updated_at:now() };
    await ldb.products.update(id, upd);
    setProducts(p=>p.map(p=>p.id===id?{...p,...upd}:p));
    if (navigator.onLine) { const {error}=await sb.from('products').update({...u,updated_at:upd.updated_at}).eq('id',id); if(!error) await ldb.products.update(id,{_synced:1}); }
  };
  const deleteProduct = async id => {
    await ldb.products.update(id, { _deleted:1, _synced:0, _updated_at:now() });
    setProducts(p=>p.filter(p=>p.id!==id));
    if (navigator.onLine) { await sb.from('products').delete().eq('id',id); await ldb.products.delete(id); }
  };
  const adjustStock = async (id,delta) => {
    const p = products.find(p=>p.id===id); if(!p) return;
    const ns = Math.max(0,(p.stock||0)+delta);
    const upd = { stock:ns, updated_at:now(), _synced:0, _updated_at:now() };
    await ldb.products.update(id, upd);
    setProducts(p=>p.map(p=>p.id===id?{...p,...upd}:p));
    if (navigator.onLine) { const {error}=await sb.from('products').update({stock:ns,updated_at:upd.updated_at}).eq('id',id); if(!error) await ldb.products.update(id,{_synced:1}); }
  };

  const addLoss = async l => {
    const uid = session.user.id;
    const rb = session.user.user_metadata?.name || session.user.email;
    const row = { id:l.id, description:l.desc, qty:l.qty, reason:l.reason||null, date:l.date, user_id:uid, registered_by:rb, updated_at:now(), _synced:0, _deleted:0, _updated_at:now(), desc:l.desc };
    await ldb.losses.put(row);
    setLosses(p=>[row,...p]);
    if (navigator.onLine) { const {error}=await sb.from('losses').upsert({id:row.id,description:row.description,qty:row.qty,reason:row.reason,date:row.date,user_id:uid,registered_by:rb,updated_at:row.updated_at}); if(!error) await ldb.losses.update(row.id,{_synced:1}); }
  };
  const editLoss = async (id,u) => {
    const upd = { description:u.desc, qty:u.qty, reason:u.reason||null, date:u.date, updated_at:now(), _synced:0, _updated_at:now(), desc:u.desc };
    await ldb.losses.update(id, upd);
    setLosses(p=>p.map(l=>l.id===id?{...l,...upd}:l));
    if (navigator.onLine) { const {error}=await sb.from('losses').update({description:upd.description,qty:upd.qty,reason:upd.reason,date:upd.date,updated_at:upd.updated_at}).eq('id',id); if(!error) await ldb.losses.update(id,{_synced:1}); }
  };
  const deleteLoss = async id => {
    await ldb.losses.update(id, { _deleted:1, _synced:0, _updated_at:now() });
    setLosses(p=>p.filter(l=>l.id!==id));
    if (navigator.onLine) { await sb.from('losses').delete().eq('id',id); await ldb.losses.delete(id); }
  };

  const saveBrand = async nb => {
    const uid = session.user.id;
    const row = { user_id:uid, name:nb.name, logo:nb.logo, color:nb.color, logo_url:nb.logo_url||null, updated_at:now(), _synced:0, _updated_at:now() };
    await ldb.profiles.put(row);
    setBrand(nb);
    // Notifica o Service Worker para atualizar o manifest dinamico
    if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({
        type: 'UPDATE_BRAND',
        name: nb.name,
        logo_url: nb.logo_url || null,
        color: nb.color || '#002f59',
      });
    }
    if (navigator.onLine) { const {error}=await sb.from('company_profiles').upsert({user_id:uid,name:nb.name,logo:nb.logo,color:nb.color,logo_url:nb.logo_url||null}); if(!error) await ldb.profiles.update(uid,{_synced:1}); }
  };

  const Loader = ({text}) => (
    <div className="min-h-screen flex items-center justify-center flex-col gap-3" style={{background:'#f8fafc'}}>
      <div className="w-10 h-10 border-2 border-gray-200 rounded-full animate-spin" style={{borderTopColor:'#1a6b5c'}}/>
      {text && <p className="text-sm text-gray-400">{text}</p>}
    </div>
  );

  if(appLoading) return <Loader/>;
  if(!session) return <Login/>;
  if(dataLoading) return <Loader text="Carregando seus dados..."/>;
  if(dataError) return (
    <div className="min-h-screen flex items-center justify-center flex-col gap-4 p-6" style={{background:'#f8fafc'}}>
      <span className="text-4xl">⚠️</span>
      <p className="text-sm font-semibold text-gray-700">{dataError}</p>
      <button onClick={()=>loadData(session.user.id)} className="px-6 py-2.5 text-white rounded-xl text-sm font-semibold bg-green-600">Tentar novamente</button>
    </div>
  );

  const p = {brand,toast,confirm};
  const views = {
    dashboard: <Dashboard tx={tx} products={products} brand={brand} onNav={setView}/>,
    income: <TxView type="income" tx={tx} products={products} onAdd={addTx} onEdit={editTx} onDelete={deleteTx} onDeductStock={(id,qty)=>adjustStock(id,-qty)} {...p}/>,
    expense: <TxView type="expense" tx={tx} products={products} onAdd={addTx} onEdit={editTx} onDelete={deleteTx} onDeductStock={()=>{}} {...p}/>,
    inventory: <InventoryView products={products} losses={losses} onAddProduct={addProduct} onEditProduct={editProduct} onDeleteProduct={deleteProduct} onAddLoss={addLoss} onEditLoss={editLoss} onDeleteLoss={deleteLoss} onAdjustStock={adjustStock} {...p}/>,
    email: <EmailView brand={brand} toast={toast}/>,
    report: <ReportView tx={tx} toast={toast}/>,
    settings: <SettingsView brand={brand} session={session} onSave={saveBrand} toast={toast} confirm={confirm} isAdmin={isAdminDB}/>,
  };

  return (
    <div className="min-h-screen flex" style={{background:'#f8fafc'}}>
      <Offline/>
      <SyncBadge status={syncStatus}/>
      <Sidebar view={view} onNav={setView} brand={brand} open={sidebarOpen} onClose={()=>setSidebarOpen(false)}/>
      <div className="flex-1 lg:ml-64 flex flex-col min-h-screen">
        <header className="sticky top-0 z-20 bg-white border-b border-gray-100 px-4 py-3 flex items-center gap-3 lg:hidden">
          <button onClick={()=>setSidebarOpen(true)} className="text-gray-400 p-1 rounded-lg hover:bg-gray-100">
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <div className="flex items-center gap-2">
            {brand.logo_url
              ? <img src={brand.logo_url} alt="logo" className="w-7 h-7 rounded-lg object-cover"/>
              : <div className="w-7 h-7 rounded-lg flex items-center justify-center text-sm" style={{background:brand.color}}><img src={brand.logo} alt="Financia" style={{width:'100%',height:'100%',objectFit:'contain',padding:'4px'}}/></div>
            }
            <span className="font-bold text-gray-900 text-sm">{brand.name}</span>
          </div>
        </header>
        <main className="flex-1 p-4 lg:p-8 max-w-2xl w-full mx-auto">{views[view]}</main>
      </div>
      <Toast toast={toastData}/>
      {confirmData && <Confirm msg={confirmData.msg} onOk={()=>{confirmData.onOk();setConfirmData(null);}} onCancel={()=>setConfirmData(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
