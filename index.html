const Sel = ({label,className='',children,...p}) => (

const Toast = ({toast}) => toast ? (

const Offline = () => {
  const [off,setOff] = useState(!navigator.onLine);
  useEffect(() => {
    const on=()=>setOff(false), off2=()=>setOff(true);
    window.addEventListener('online',on); window.addEventListener('offline',off2);
    return () => { window.removeEventListener('online',on); window.removeEventListener('offline',off2); };
  },[]);
  return off ? <div className="fixed top-0 left-0 right-0 z-50 bg-amber-500 text-white text-xs font-semibold text-center py-2">Sem internet - alteracoes nao serao salvas</div> : null;
};

const PSearch = ({products,value,onSelect,onChange,placeholder}) => {
  const [open,setOpen] = useState(false);
  const filtered = value.length>0 ? products.filter(p=>p.name.toLowerCase().includes(value.toLowerCase())) : products;
  return (
    <div className="relative flex-1">
      <input value={value} onChange={e=>{onChange(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)} onBlur={()=>setTimeout(()=>setOpen(false),300)}
        placeholder={placeholder||(products.length>0?'Buscar produto...':'Descricao')}
        className="border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:border-gray-500 transition w-full"/>
      {open && products.length>0 && filtered.length>0 && (
        <div className="absolute top-full left-0 right-0 mt-1 bg-white rounded-xl border border-gray-200 z-30 overflow-hidden max-h-48 overflow-y-auto" style={{boxShadow:'0 8px 24px rgba(0,0,0,0.1)'}}>
          {filtered.map(p => (
            <button key={p.id} onPointerDown={()=>{onSelect(p);setOpen(false);}} className="flex items-center justify-between w-full px-3 py-2.5 hover:bg-gray-50 text-left border-b border-gray-50 last:border-0">
              <div className="flex items-center gap-2 min-w-0">
                {p.category && <span className="text-xs bg-gray-100 text-gray-400 px-1.5 py-0.5 rounded-md flex-shrink-0">{p.category}</span>}
                <span className="text-sm text-gray-800 truncate">{p.name}</span>
                {p.stock!=null && <span className={'text-xs px-1.5 py-0.5 rounded-full flex-shrink-0 '+(p.stock<=0?'bg-red-50 text-red-500':p.stock<=5?'bg-amber-50 text-amber-600':'bg-gray-100 text-gray-500')}>{p.stock}un</span>}
              </div>
              <span className="text-xs font-semibold text-gray-400 ml-2">{fmt(p.price)}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
};

const CartRow = ({item,idx,products,onChange,onSelect,onRemove}) => {
  const lt = (Number(item.qty)||0)*(Number(item.up)||0);
  return (
    <div className="rounded-xl border border-gray-100 bg-gray-50 p-3 flex flex-col gap-2">
      <div className="flex items-center gap-2">
        <PSearch products={products} value={item.desc} onSelect={p=>onSelect(idx,p.name,p.price)} onChange={v=>onChange(idx,'desc',v)}/>
        {onRemove && <button onClick={onRemove} className="text-gray-300 hover:text-red-400 p-1 flex-shrink-0"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg></button>}
      </div>
      <div className="flex items-end gap-2">
        <Inp label="Qtd" type="number" min="1" value={item.qty} onChange={e=>onChange(idx,'qty',e.target.value)} className="w-16 flex-shrink-0"/>
        <Inp label="Preco unit." type="number" step="0.01" min="0" value={item.up} onChange={e=>onChange(idx,'up',e.target.value)} className="flex-1"/>
        <div className="flex flex-col gap-1.5 w-24 flex-shrink-0">
          <label className="text-xs font-semibold text-gray-400 uppercase tracking-wide">Total</label>
          <div className="border border-gray-100 rounded-xl px-3 py-2.5 text-sm bg-white text-gray-700 font-semibold">{lt>0?fmt(lt):'-'}</div>
        </div>
      </div>
    </div>
  );
};

const SaleForm = ({products,brand,onSave,onClose}) => {
  const [items,setItems] = useState([{desc:'',qty:'1',up:''}]);
  const [date,setDate] = useState(today());
  const [method,setMethod] = useState('PIX');
  const [saving,setSaving] = useState(false);
  const total = items.reduce((s,i)=>s+(Number(i.qty)||0)*(Number(i.up)||0),0);
  const ch = (idx,f,v) => setItems(p=>p.map((it,i)=>i===idx?{...it,[f]:v}:it));
  const sel = (idx,name,price) => setItems(p=>p.map((it,i)=>i===idx?{...it,desc:name,up:String(price)}:it));
  const save = async () => {
    const valid = items.filter(i=>i.desc&&i.up);
    if(!valid.length||!total) return;
    setSaving(true);
    await onSave({id:uid(),type:'income',desc:safe(valid.length===1?valid[0].desc:valid.length+' itens'),items:valid.map(i=>({desc:safe(i.desc),qty:Number(i.qty)||1,unitPrice:Number(i.up)})),amount:total,date,method});
    onClose();
  };
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 anim-fade" style={{background:'rgba(0,0,0,0.5)'}}>
      <div className="bg-white rounded-t-2xl sm:rounded-2xl w-full sm:max-w-lg flex flex-col" style={{maxHeight:'90vh',boxShadow:'0 25px 60px rgba(0,0,0,0.2)'}}>
        <div className="flex items-center justify-between px-6 py-4 border-b border-gray-100 flex-shrink-0">
          <span className="font-semibold text-gray-900">Nova Venda</span>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 p-1 rounded-lg hover:bg-gray-100"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg></button>
        </div>
        <div className="overflow-y-auto flex-1 px-6 py-4 flex flex-col gap-4">
          <div className="flex flex-col gap-3">
            {items.map((it,idx)=><CartRow key={idx} item={it} idx={idx} products={products} onChange={ch} onSelect={sel} onRemove={items.length>1?()=>setItems(p=>p.filter((_,i)=>i!==idx)):null}/>)}
            <button onClick={()=>setItems(p=>[...p,{desc:'',qty:'1',up:''}])} className="flex items-center gap-2 text-sm text-gray-400 hover:text-gray-600 w-fit">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>Adicionar item
            </button>
          </div>
          <div className="flex items-center justify-between py-3 border-t border-b border-gray-100">
            <span className="text-sm font-semibold text-gray-600">Total da venda</span>
            <span className="text-2xl font-bold text-gray-900">{fmt(total)}</span>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <Inp label="Data" type="date" value={date} onChange={e=>setDate(e.target.value)}/>
            <Sel label="Pagamento" value={method} onChange={e=>setMethod(e.target.value)}>
              {['PIX','Dinheiro','Cartao de Debito','Cartao de Credito','Boleto','Transferencia'].map(m=><option key={m}>{m}</option>)}
            </Sel>
          </div>
        </div>
        <div className="flex gap-2 px-6 pb-6 pt-3 flex-shrink-0">
          <button onClick={onClose} className="flex-1 border border-gray-200 text-gray-600 rounded-xl py-3 text-sm font-medium hover:bg-gray-50">Cancelar</button>
          <button onClick={save} disabled={saving} className="flex-1 text-white rounded-xl py-3 text-sm font-semibold hover:opacity-90 flex items-center justify-center gap-2" style={{background:brand.color}}>
            {saving?<Spin white/>:('Confirmar . '+fmt(total))}
          </button>
        </div>
      </div>
    </div>
  );
};

const BarChartSVG = ({data}) => {
  const max = Math.max(...data.flatMap(d=>[d.i,d.o]),1);
  const W=44,H=130,bw=10,pad=4;
  return (
    <svg width="100%" height={H} viewBox={'0 0 '+(data.length*W)+' '+H} preserveAspectRatio="xMidYMid meet">
      {data.map((d,i)=>{
        const x=i*W+pad, ih=Math.round((d.i/max)*(H-24)), oh=Math.round((d.o/max)*(H-24));
        return (
          <g key={i}>
            <rect x={x} y={H-24-ih} width={bw} height={ih||1} fill="#16a34a" rx={2}/>
            <rect x={x+bw+2} y={H-24-oh} width={bw} height={oh||1} fill="#fca5a5" rx={2}/>
            <text x={x+bw+1} y={H-6} textAnchor="middle" fontSize={9} fill="#9ca3af">{d.day}</text>
          </g>
        );
      })}
    </svg>
  );
};

const Dashboard = ({tx,products,brand,onNav}) => {
  const cm = today().slice(0,7);
  const mtx = tx.filter(t=>t.date.startsWith(cm));
  const ti = mtx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const to = mtx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const dtx = tx.filter(t=>t.date===today());
  const di = dtx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const dout = dtx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const chartData = useMemo(()=>Array.from({length:7},(_,i)=>{
    const d=prevDays(6-i), dt=tx.filter(t=>t.date===d);
    return {day:new Date(d+'T12:00').toLocaleDateString('pt-BR',{weekday:'short'}),i:dt.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0),o:dt.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0)};
  }),[tx]);
  const lowStock = products.filter(p=>p.stock!=null&&p.stock<=5);
  const recent = [...tx].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,6);
  return (
    <div className="flex flex-col gap-6">
      <div>
        <h2 className="text-2xl font-bold text-gray-900">Dashboard</h2>
        <p className="text-sm text-gray-400 mt-0.5">{new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p>
      </div>
      {lowStock.length>0 && (
        <div className="rounded-2xl border border-amber-200 bg-amber-50 px-5 py-4 flex flex-col gap-2">
          <div className="flex items-center justify-between">
            <p className="text-sm font-semibold text-amber-800">Estoque baixo</p>
            <button onClick={()=>onNav('inventory')} className="text-xs text-amber-600 font-semibold hover:underline">Ver estoque</button>
          </div>
          {lowStock.map(p=>(
            <div key={p.id} className="flex items-center justify-between">
              <span className="text-sm text-amber-700">{p.name}</span>
              <span className={'text-xs font-semibold px-2 py-0.5 rounded-full '+(p.stock<=0?'bg-red-100 text-red-600':'bg-amber-100 text-amber-700')}>{p.stock<=0?'Esgotado':p.stock+' un.'}</span>
            </div>
          ))}
        </div>
      )}
      <div className="grid grid-cols-2 gap-3">
        <KpiCard label="Entradas (mes)" value={fmt(ti)} color="#16a34a"/>
        <KpiCard label="Saidas (mes)" value={fmt(to)} color="#ef4444"/>
        <KpiCard label="Lucro liquido" value={fmt(ti-to)} color={brand.color} sub="Este mes"/>
        <KpiCard label="Saldo hoje" value={fmt(di-dout)} color="#3b82f6" sub={'+'+fmt(di)+' / -'+fmt(dout)}/>
      </div>
      <Card className="p-5">
        <div className="flex items-center justify-between mb-3">
          <p className="text-sm font-semibold text-gray-800">Últimos 7 dias</p>
          <div className="flex gap-3 text-xs text-gray-400">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-sm bg-green-600 inline-block"/>Entradas</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-sm bg-red-200 inline-block"/>Saidas</span>
          </div>
        </div>
        {tx.length===0
          ? <div className="flex flex-col items-center py-8 gap-2"><p className="text-sm text-gray-300">Nenhuma movimentacao ainda</p><button onClick={()=>onNav('income')} className="text-xs font-semibold text-green-600 hover:underline">Registrar primeira venda</button></div>
          : <BarChartSVG data={chartData}/>
        }
      </Card>
      <Card>
        <div className="px-5 py-4 border-b border-gray-50 flex items-center justify-between">
          <p className="text-sm font-semibold text-gray-800">Movimentacoes recentes</p>
          {recent.length>0 && <button onClick={()=>onNav('report')} className="text-xs text-gray-400 hover:text-gray-600">Ver relatorio</button>}
        </div>
        {recent.length===0
          ? <div className="py-10 flex flex-col items-center gap-2"><span className="text-3xl">📋</span><p className="text-sm text-gray-500">Nenhuma movimentacao</p><div className="flex gap-3"><button onClick={()=>onNav('income')} className="text-xs font-semibold text-green-600 hover:underline">+ Venda</button><button onClick={()=>onNav('expense')} className="text-xs font-semibold text-red-500 hover:underline">+ Despesa</button></div></div>
          : <div className="divide-y divide-gray-50">{recent.map(t=>(
              <div key={t.id} className="flex items-center justify-between px-5 py-3.5">
                <div className="flex items-center gap-3 min-w-0">
                  <div className={'w-8 h-8 rounded-xl flex items-center justify-center text-sm font-bold flex-shrink-0 '+(t.type==='income'?'bg-green-50 text-green-600':'bg-red-50 text-red-500')}>{t.type==='income'?'UP':'DOWN'}</div>
                  <div className="min-w-0"><p className="text-sm font-medium text-gray-800 truncate">{t.desc}</p><p className="text-xs text-gray-400">{fmtDate(t.date)+' . '+(t.method||t.category||'')}</p></div>
                </div>
                <span className={'text-sm font-semibold flex-shrink-0 ml-3 '+(t.type==='income'?'text-green-600':'text-red-500')}>{(t.type==='income'?'+':'-')+fmt(t.amount)}</span>
              </div>
            ))}</div>
        }
      </Card>
    </div>
  );
};

const TxView = ({type,tx,products,onAdd,onEdit,onDelete,onDeductStock,brand,toast,confirm}) => {
  const isIncome = type==='income';
  const [modal,setModal] = useState(false);
  const [editItem,setEditItem] = useState(null);
  const [saving,setSaving] = useState(false);
  const [search,setSearch] = useState('');
  const [dateFrom,setDateFrom] = useState('');
  const [dateTo,setDateTo] = useState('');
  const cats = ['Fixo','Variavel','Estoque','Marketing','Pessoal','Servicos','Outro'];
  const [form,setForm] = useState({desc:'',amount:'',date:today(),cat:'Fixo',method:'PIX'});
  let filtered = tx.filter(t=>t.type===type);
  if(search) filtered=filtered.filter(t=>t.desc.toLowerCase().includes(search.toLowerCase()));
  if(dateFrom) filtered=filtered.filter(t=>t.date>=dateFrom);
  if(dateTo) filtered=filtered.filter(t=>t.date<=dateTo);
  filtered.sort((a,b)=>b.date.localeCompare(a.date));
  const total = filtered.reduce((s,t)=>s+t.amount,0);
  const openEdit = t => setEditItem({id:t.id,desc:t.desc,amount:String(t.amount),date:t.date,cat:t.category||'Fixo',method:t.method||'PIX'});
  const saveEdit = async () => {
    if(!editItem.desc||!editItem.amount) return;
    setSaving(true);
    await onEdit(editItem.id,{desc:safe(editItem.desc),amount:Number(editItem.amount),date:editItem.date,method:isIncome?editItem.method:null,cat:isIncome?null:editItem.cat});
    toast(isIncome?'Venda atualizada':'Despesa atualizada'); setSaving(false); setEditItem(null);
  };
  const saveNew = async () => {
    if(!form.desc||!form.amount) return;
    setSaving(true);
    await onAdd({id:uid(),type,desc:safe(form.desc),amount:Number(form.amount),date:form.date,method:isIncome?form.method:null,cat:isIncome?null:form.cat});
    toast(isIncome?'Venda registrada!':'Despesa registrada!'); setModal(false); setSaving(false); setForm({desc:'',amount:'',date:today(),cat:'Fixo',method:'PIX'});
  };
  const exportCSV = () => {
    const rows = filtered.map(t=>t.date+',"'+(t.desc||'')+'",'+(t.amount.toFixed(2))+','+(t.method||t.category||''));
    const csv = 'Data,Descricao,Valor,Tipo\n'+rows.join('\n');
    const a = document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv); a.download=(isIncome?'vendas':'despesas')+'-'+today()+'.csv'; a.click();
    toast('CSV exportado!');
  };
  return (
    <div className="flex flex-col gap-6">
      <div className="flex items-start justify-between">
        <div>
          <h2 className="text-2xl font-bold text-gray-900">{isIncome?'Vendas':'Despesas'}</h2>
          <p className="text-sm text-gray-400 mt-0.5">{filtered.length+' registro'+(filtered.length!==1?'s':'')+' . '}<span className={'font-semibold '+(isIncome?'text-green-600':'text-red-500')}>{fmt(total)}</span></p>
        </div>
        <div className="flex gap-2">
          <button onClick={exportCSV} title="Exportar CSV" className="p-2.5 border border-gray-200 text-gray-500 rounded-xl hover:bg-gray-50 transition">
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          </button>
          <button onClick={()=>setModal(true)} className="flex items-center gap-2 text-white text-sm font-semibold px-4 py-2.5 rounded-xl hover:opacity-90" style={{background:brand.color}}>
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
            {isIncome?'Nova Venda':'Nova Despesa'}
          </button>
        </div>
      </div>
      <Card className="p-4 flex flex-col gap-3">
        <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide">Filtros</p>
        <div className="grid grid-cols-1 gap-2 sm:grid-cols-3">
          <div className="relative">
            <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar descricao..." className="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-xl focus:outline-none focus:border-gray-400 bg-white"/>
          </div>
          <Inp type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} placeholder="Data inicial"/>
          <Inp type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} placeholder="Data final"/>
        </div>
        {(search||dateFrom||dateTo) && <button onClick={()=>{setSearch('');setDateFrom('');setDateTo('');}} className="text-xs text-gray-400 hover:text-gray-600 w-fit">Limpar filtros</button>}
      </Card>
      <Card>
        {filtered.length===0
          ? <Empty icon={isIncome?'💰':'📤'} title={isIncome?'Nenhuma venda':'Nenhuma despesa'} sub={isIncome?'Registre vendas com multiplos itens e calculo automatico.':'Registre aluguel, energia, fornecedores e outras saidas.'}/>
          : <div className="divide-y divide-gray-50">{filtered.map(t=>(
              <div key={t.id} className="flex items-center justify-between px-4 py-3.5 gap-3">
                <div className="flex items-center gap-3 min-w-0 flex-1">
                  <div className={'w-8 h-8 rounded-xl flex items-center justify-center text-sm font-bold flex-shrink-0 '+(isIncome?'bg-green-50 text-green-600':'bg-red-50 text-red-500')}>{isIncome?'UP':'DOWN'}</div>
                  <div className="min-w-0"><p className="text-sm font-medium text-gray-800 truncate">{t.desc}</p><p className="text-xs text-gray-400">{fmtDate(t.date)+' . '+(t.method||t.category||'')+(t.items&&t.items.length>1?' . '+t.items.length+' itens':'')}</p></div>
                </div>
                <div className="flex items-center gap-1 flex-shrink-0">
                  <span className={'text-sm font-semibold mr-1 '+(isIncome?'text-green-600':'text-red-500')}>{(isIncome?'+':'-')+fmt(t.amount)}</span>
                  <EditBtn onClick={()=>openEdit(t)}/>
                  <DelBtn onClick={()=>confirm('Excluir este registro?',async()=>{await onDelete(t.id);toast('Removido');})}/>
                </div>
              </div>
            ))}</div>
        }
      </Card>
      {modal && (isIncome
        ? <SaleForm products={products} brand={brand} onSave={async sale=>{await onAdd(sale);if(sale.items)sale.items.forEach(it=>{const p=products.find(p=>p.name===it.desc);if(p&&p.stock!=null)onDeductStock(p.id,it.qty);});toast('Venda registrada!');}} onClose={()=>setModal(false)}/>
        : <Modal title="Nova Despesa" onClose={()=>setModal(false)} onSave={saveNew} saving={saving}>
            <Inp label="Descricao" value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))} placeholder="Ex: Aluguel, Energia..."/>
            <Inp label="Valor (R$)" type="number" step="0.01" min="0" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} placeholder="0,00"/>
            <Inp label="Data" type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>
            <Sel label="Categoria" value={form.cat} onChange={e=>setForm(f=>({...f,cat:e.target.value}))}>{cats.map(c=><option key={c}>{c}</option>)}</Sel>
          </Modal>
      )}
      {editItem && (
        <Modal title={isIncome?'Editar Venda':'Editar Despesa'} onClose={()=>setEditItem(null)} onSave={saveEdit} saving={saving} saveLabel="Salvar alteracoes">
          <Inp label="Descricao" value={editItem.desc} onChange={e=>setEditItem(f=>({...f,desc:e.target.value}))}/>
          <Inp label="Valor (R$)" type="number" step="0.01" min="0" value={editItem.amount} onChange={e=>setEditItem(f=>({...f,amount:e.target.value}))}/>
          <Inp label="Data" type="date" value={editItem.date} onChange={e=>setEditItem(f=>({...f,date:e.target.value}))}/>
          {isIncome
            ? <Sel label="Pagamento" value={editItem.method} onChange={e=>setEditItem(f=>({...f,method:e.target.value}))}>{['PIX','Dinheiro','Cartao de Debito','Cartao de Credito','Boleto','Transferencia'].map(m=><option key={m}>{m}</option>)}</Sel>
            : <Sel label="Categoria" value={editItem.cat} onChange={e=>setEditItem(f=>({...f,cat:e.target.value}))}>{cats.map(c=><option key={c}>{c}</option>)}</Sel>
          }
        </Modal>
      )}
    </div>
  );
};

const InventoryView = ({products,losses,onAddProduct,onEditProduct,onDeleteProduct,onAddLoss,onEditLoss,onDeleteLoss,onAdjustStock,brand,toast,confirm}) => {
  const [tab,setTab] = useState('products');
  const [search,setSearch] = useState('');
  const [collapsed,setCollapsed] = useState(new Set());
  const [pm,setPm] = useState(false);
  const [editP,setEditP] = useState(null);
  const [lm,setLm] = useState(false);
  const [editL,setEditL] = useState(null);
  const [sm,setSm] = useState(null);
  const [pf,setPf] = useState({name:'',category:'',price:'',cost:'',stock:''});
  const [lf,setLf] = useState({desc:'',qty:'1',reason:'',date:today()});
  const [sq,setSq] = useState('1');
  const [saving,setSaving] = useState(false);
  const saveProd = async () => {
    if(!pf.name||!pf.price) return;
    setSaving(true);
    await onAddProduct({id:'P'+String(Date.now()).slice(-6),name:safe(pf.name),category:pf.category||null,price:Number(pf.price),cost:pf.cost?Number(pf.cost):null,stock:pf.stock!==''?Number(pf.stock):null});
    toast('Produto adicionado!'); setSaving(false); setPm(false); setPf({name:'',category:'',price:'',cost:'',stock:''});
  };
  const saveEditP = async () => {
    if(!editP.name||!editP.price) return;
    setSaving(true);
    await onEditProduct(editP.id,{name:safe(editP.name),category:editP.category||null,price:Number(editP.price),cost:editP.cost?Number(editP.cost):null,stock:editP.stock!==''&&editP.stock!=null?Number(editP.stock):null});
    toast('Produto atualizado'); setSaving(false); setEditP(null);
  };
  const saveLoss = async () => {
    if(!lf.desc||!lf.qty) return;
    setSaving(true);
    await onAddLoss({id:uid(),desc:safe(lf.desc),qty:Number(lf.qty),reason:lf.reason,date:lf.date});
    const p=products.find(p=>p.name===lf.desc); if(p&&p.stock!=null) await onAdjustStock(p.id,-Number(lf.qty));
    toast('Perda registrada'); setSaving(false); setLm(false); setLf({desc:'',qty:'1',reason:'',date:today()});
  };
  const saveEditL = async () => {
    if(!editL.desc||!editL.qty) return;
    setSaving(true);
    await onEditLoss(editL.id,{desc:safe(editL.desc),qty:Number(editL.qty),reason:editL.reason,date:editL.date});
    toast('Perda atualizada'); setSaving(false); setEditL(null);
  };
  const saveStock = async () => {
    if(!sq||!sm) return;
    setSaving(true);
    await onAdjustStock(sm,Number(sq));
    toast('Estoque atualizado!'); setSaving(false); setSm(null); setSq('1');
  };
  const toggleCat = cat => setCollapsed(p=>{const n=new Set(p);n.has(cat)?n.delete(cat):n.add(cat);return n;});
  const disp = search.trim() ? products.filter(p=>[p.name,p.category,p.id].filter(Boolean).some(v=>v.toLowerCase().includes(search.toLowerCase()))) : products;
  const grouped = Object.entries(disp.reduce((a,p)=>{const k=p.category||'Sem categoria';(a[k]=a[k]||[]).push(p);return a;},{})).sort(([a],[b])=>a==='Sem categoria'?1:b==='Sem categoria'?-1:a.localeCompare(b));
  const sp = sm ? products.find(p=>p.id===sm) : null;
  return (
    <div className="flex flex-col gap-6">
      <div className="flex items-start justify-between">
        <div><h2 className="text-2xl font-bold text-gray-900">Estoque</h2><p className="text-sm text-gray-400 mt-0.5">{products.length+' item'+(products.length!==1?'s':'')}</p></div>
        <div className="flex gap-2">
          {tab==='products' && <button onClick={()=>setPm(true)} className="flex items-center gap-2 text-white text-sm font-semibold px-4 py-2.5 rounded-xl hover:opacity-90" style={{background:brand.color}}><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>Adicionar</button>}
          {tab==='losses' && <button onClick={()=>setLm(true)} className="flex items-center gap-2 bg-red-600 text-white text-sm font-semibold px-4 py-2.5 rounded-xl hover:opacity-90"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>Perda</button>}
        </div>
      </div>
      <div className="flex gap-1 bg-gray-100 rounded-xl p-1">
        {[{key:'products',label:'Produtos e Servicos'},{key:'losses',label:'Perdas'}].map(t=>(
          <button key={t.key} onClick={()=>setTab(t.key)} className={'flex-1 py-2 text-sm font-medium rounded-lg transition '+(tab===t.key?'bg-white text-gray-900 shadow-sm':'text-gray-500')}>{t.label}</button>
        ))}
      </div>
      {tab==='products' && (
        <Card>
          <div className="px-5 py-3 border-b border-gray-50">
            <div className="relative"><svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por nome ou categoria..." className="w-full pl-9 pr-3 py-2 text-sm bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:border-gray-300"/></div>
          </div>
          {disp.length===0
            ? <Empty icon="📦" title="Nenhum item" sub="Adicione produtos ou servicos com categoria, custo e estoque."/>
            : grouped.map(([cat,items])=>(
                <div key={cat}>
                  <button onClick={()=>toggleCat(cat)} className="w-full flex items-center justify-between px-5 py-2.5 bg-gray-50 hover:bg-gray-100 transition border-b border-gray-100">
                    <div className="flex items-center gap-2">
                      <svg className={'w-3.5 h-3.5 text-gray-400 transition-transform '+(collapsed.has(cat)?'-rotate-90':'')} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/></svg>
                      <span className="text-xs font-semibold text-gray-500 uppercase tracking-wide">{cat}</span>
                    </div>
                    <span className="text-xs text-gray-400">{items.length+' '+(items.length===1?'item':'itens')}</span>
                  </button>
                  {!collapsed.has(cat) && (
                    <div className="divide-y divide-gray-50">{items.map(p=>(
                      <div key={p.id} className="px-4 py-3.5 flex items-center justify-between gap-3">
                        <div className="min-w-0 flex-1">
                          <p className="text-sm font-medium text-gray-800">{p.name}</p>
                          <div className="flex items-center gap-3 mt-0.5 flex-wrap">
                            <span className="text-xs text-gray-400">{'Venda: '+fmt(p.price)}</span>
                            {p.cost!=null && <><span className="text-xs text-gray-400">{'Custo: '+fmt(p.cost)}</span><span className="text-xs text-green-600 font-medium">{'Margem: '+(((p.price-p.cost)/p.price)*100).toFixed(0)+'%'}</span></>}
                          </div>
                        </div>
                        <div className="flex items-center gap-1 flex-shrink-0">
                          {p.stock!=null && <button onClick={()=>{setSm(p.id);setSq('1');}} className={'text-xs font-semibold px-2.5 py-1 rounded-lg mr-1 '+(p.stock<=0?'bg-red-50 text-red-600':p.stock<=5?'bg-amber-50 text-amber-700':'bg-green-50 text-green-700')}>{p.stock<=0?'Esgotado':p.stock+' un'}</button>}
                          <EditBtn onClick={()=>setEditP({id:p.id,name:p.name,category:p.category||'',price:String(p.price),cost:p.cost!=null?String(p.cost):'',stock:p.stock!=null?String(p.stock):''})}/>
                          <DelBtn onClick={()=>confirm('Excluir "'+p.name+'"?',async()=>{await onDeleteProduct(p.id);toast('Produto removido');})}/>
                        </div>
                      </div>
                    ))}</div>
                  )}
                </div>
              ))
          }
        </Card>
      )}
      {tab==='losses' && (
        <Card>
          {losses.length===0
            ? <Empty icon="⚠️" title="Nenhuma perda" sub="Registre produtos vencidos, cancelados ou danificados."/>
            : <div className="divide-y divide-gray-50">{[...losses].sort((a,b)=>b.date.localeCompare(a.date)).map(l=>(
                <div key={l.id} className="flex items-center justify-between px-4 py-3.5 gap-3">
                  <div className="flex items-center gap-3 min-w-0 flex-1">
                    <div className="w-8 h-8 rounded-xl bg-amber-50 text-amber-600 flex items-center justify-center text-sm flex-shrink-0">!</div>
                    <div className="min-w-0"><p className="text-sm font-medium text-gray-800">{l.qty+'x '+l.desc}</p><p className="text-xs text-gray-400">{fmtDate(l.date)+(l.reason?' . '+l.reason:'')}</p></div>
                  </div>
                  <div className="flex items-center gap-1 flex-shrink-0">
                    <EditBtn onClick={()=>setEditL({id:l.id,desc:l.desc,qty:String(l.qty),reason:l.reason||'',date:l.date})}/>
                    <DelBtn onClick={()=>confirm('Excluir esta perda?',async()=>{await onDeleteLoss(l.id);toast('Perda removida');})}/>
                  </div>
                </div>
              ))}</div>
          }
        </Card>

const EmailView = ({brand,toast}) => {
  const [to,setTo] = useState('');
  const [subject,setSubject] = useState('');
  const [body,setBody] = useState('');
  const [tpl,setTpl] = useState('custom');

  const send = () => { if(!to||!subject||!body) return; window.open('mailto:'+encodeURIComponent(to)+'?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(body),'_blank'); toast('Abrindo seu e-mail...'); };
  const copy = async () => { await navigator.clipboard.writeText('Para: '+to+'\nAssunto: '+subject+'\n\n'+body); setCopied(true); setTimeout(()=>setCopied(false),2000); toast('Copiado!'); };
  return (
    <div className="flex flex-col gap-6">
      <div><h2 className="text-2xl font-bold text-gray-900">E-mails</h2><p className="text-sm text-gray-400 mt-0.5">Templates prontos e editor livre</p></div>
      <Card className="p-5 flex flex-col gap-4">
        <div>
          <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Template</p>
          <div className="flex gap-2 flex-wrap">
            {TEMPLATES.map(t=>(
              <button key={t.id} onClick={()=>applyTpl(t.id)} className={'text-xs font-medium px-3 py-1.5 rounded-xl border transition '+(tpl===t.id?'border-transparent text-white':'border-gray-200 text-gray-600 hover:bg-gray-50')} style={tpl===t.id?{background:brand.color}:{}}>
                {t.name}
              </button>
            ))}
          </div>
        </div>
        <Inp label="Para (e-mail)" type="email" value={to} onChange={e=>setTo(e.target.value)} placeholder="cliente@email.com"/>

        <Textarea label="Mensagem" value={body} onChange={e=>setBody(e.target.value)} placeholder="Escreva sua mensagem aqui..."/>
        <div className="bg-blue-50 border border-blue-100 rounded-xl px-4 py-3"><p className="text-xs text-blue-700">Substitua os textos em [colchetes] antes de enviar.</p></div>

          <button onClick={copy} className="flex-1 flex items-center justify-center gap-2 border border-gray-200 text-gray-700 rounded-xl py-2.5 text-sm font-medium hover:bg-gray-50 transition">
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
            {copied?'Copiado!':'Copiar'}
          </button>
          <button onClick={send} disabled={!to||!subject||!body} className="flex-1 flex items-center justify-center gap-2 text-white rounded-xl py-2.5 text-sm font-semibold hover:opacity-90 disabled:opacity-40" style={{background:brand.color}}>
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
            Abrir no e-mail
          </button>
        </div>
      </Card>
    </div>
  );
};

const ReportView = ({tx,toast}) => {
  const months = useMemo(()=>[...new Set(tx.map(t=>t.date.slice(0,7)))].sort((a,b)=>b.localeCompare(a)),[tx]);
  const [month,setMonth] = useState(today().slice(0,7));
  const filtered = tx.filter(t=>t.date.startsWith(month));
  const income = filtered.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = filtered.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const bycat = filtered.filter(t=>t.type==='expense').reduce((a,t)=>{const k=t.category||'Outro';a[k]=(a[k]||0)+t.amount;return a;},{});
  const exportCSV = () => {
    const rows=filtered.map(t=>t.date+',"'+t.desc+'",'+t.amount.toFixed(2)+','+(t.type==='income'?'Entrada':'Saida')+','+(t.method||t.category||''));
    const csv='Data,Descricao,Valor,Tipo,Metodo/Cat\n'+rows.join('\n');
    const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv); a.download='relatorio-'+month+'.csv'; a.click();
    toast('CSV exportado!');
  };
  return (
    <div className="flex flex-col gap-6">
      <div className="flex items-start justify-between">
        <div><h2 className="text-2xl font-bold text-gray-900">Relatorio</h2><p className="text-sm text-gray-400 mt-0.5">Fechamento mensal</p></div>
        {filtered.length>0 && <button onClick={exportCSV} className="flex items-center gap-2 border border-gray-200 text-gray-600 text-sm font-medium px-3 py-2 rounded-xl hover:bg-gray-50 transition">
          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>CSV
        </button>}
      </div>
      {months.length===0 ? <Card><Empty icon="📊" title="Nenhum dado" sub="Registre vendas e despesas para gerar relatorios."/></Card> : (
        <>
          <Sel label="Periodo" value={month} onChange={e=>setMonth(e.target.value)}>{months.map(m=><option key={m} value={m}>{monthLabel(m)}</option>)}</Sel>
          <div className="grid grid-cols-3 gap-3">
            {[{l:'Entradas',v:income,c:'#16a34a'},{l:'Saidas',v:expense,c:'#ef4444'},{l:'Lucro',v:income-expense,c:income-expense>=0?'#16a34a':'#ef4444'}].map(({l,v,c})=>(
              <Card key={l} className="p-4 text-center overflow-hidden relative">
                <div className="absolute top-0 left-0 right-0 h-0.5" style={{background:c}}/>
                <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide">{l}</p>
                <p className="text-sm font-bold mt-2" style={{color:c}}>{fmt(v)}</p>
              </Card>
            ))}
          </div>
          {Object.keys(bycat).length>0 && (
            <Card className="p-5">
              <p className="text-sm font-semibold text-gray-800 mb-3">Despesas por categoria</p>
              <div className="flex flex-col gap-2.5">
                {Object.entries(bycat).sort(([,a],[,b])=>b-a).map(([cat,val])=>(
                  <div key={cat} className="flex items-center gap-3">
                    <span className="text-xs text-gray-500 w-20 flex-shrink-0 truncate">{cat}</span>
                    <div className="flex-1 bg-gray-100 rounded-full h-1.5 overflow-hidden"><div className="h-full bg-red-400 rounded-full" style={{width:(val/expense*100).toFixed(0)+'%'}}/></div>
                    <span className="text-xs font-semibold text-gray-600 w-20 text-right">{fmt(val)}</span>
                  </div>
                ))}
              </div>
            </Card>
          )}
          <Card>
            <div className="px-5 py-4 border-b border-gray-50 flex items-center justify-between">
              <p className="text-sm font-semibold text-gray-800">Movimentacoes</p>
              <span className="text-xs text-gray-400">{filtered.length+' registros'}</span>
            </div>
            {filtered.length===0 ? <div className="py-10 text-center text-sm text-gray-400">Sem registros neste mes.</div> : (
              <div className="divide-y divide-gray-50">{[...filtered].sort((a,b)=>b.date.localeCompare(a.date)).map(t=>(
                <div key={t.id} className="flex items-center justify-between px-5 py-3">
                  <div className="flex items-center gap-3 min-w-0">
                    <div className={'w-7 h-7 rounded-lg flex items-center justify-center text-xs font-bold flex-shrink-0 '+(t.type==='income'?'bg-green-50 text-green-600':'bg-red-50 text-red-500')}>{t.type==='income'?'UP':'DOWN'}</div>
                    <div className="min-w-0"><p className="text-sm font-medium text-gray-800 truncate">{t.desc}</p><p className="text-xs text-gray-400">{fmtDate(t.date)+' . '+(t.method||t.category||'')}</p></div>
                  </div>
                  <span className={'text-sm font-semibold flex-shrink-0 ml-3 '+(t.type==='income'?'text-green-600':'text-red-500')}>{(t.type==='income'?'+':'-')+fmt(t.amount)}</span>
                </div>
              ))}</div>
            )}
          </Card>
        </>
      )}
    </div>
  );
};

const AdminPanel = ({toast}) => {
  const [form,setForm] = useState({email:'',password:''});
  const [creating,setCreating] = useState(false);
  const [created,setCreated] = useState(null);
  const [copied,setCopied] = useState(false);
  const create = async () => {
    if(!form.email||!form.password) return;
    if(form.password.length<8){toast('Senha deve ter ao menos 8 caracteres.','error');return;}
    setCreating(true);
    const {error} = await sb.auth.signUp({email:form.email,password:form.password});
    if(error){
      if(error.message.includes('already'))toast('E-mail ja cadastrado.','error');
      else toast('Erro: '+error.message,'error');
    } else {
      setCreated({email:form.email,password:form.password});
      setForm({email:'',password:''});
      toast('Cliente criado!');
    }
    setCreating(false);
  };
  const copyMsg = async () => {
    const msg = 'Sistema de Gestao Financeira\n\nLink: https://gestao-financeira-7heu.onrender.com\nE-mail: '+created.email+'\nSenha: '+created.password+'\n\nAcesse e configure o nome da empresa em Configuracoes.';
    await navigator.clipboard.writeText(msg);
    setCopied(true); setTimeout(()=>setCopied(false),2500);
    toast('Copiado! Cole no WhatsApp.');
  };
  return (
    <div className="flex flex-col gap-4">
      <div><p className="text-sm font-semibold text-gray-800 mb-1">Criar novo cliente</p><p className="text-xs text-gray-400 mb-3">Preencha e-mail e senha. O cliente usa essas credenciais para entrar.</p></div>
      <Inp label="E-mail do cliente" type="email" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} placeholder="cliente@email.com"/>
      <div className="flex flex-col gap-1.5">
        <label className="text-xs font-semibold text-gray-400 uppercase tracking-wide">Senha</label>
        <div className="flex gap-2">
          <input type="text" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))} placeholder="Minimo 8 caracteres" className="border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:border-gray-500 transition flex-1"/>
          <button onClick={()=>setForm(f=>({...f,password:genPwd()}))} className="px-3 py-2.5 border border-gray-200 rounded-xl text-xs font-semibold text-gray-600 hover:bg-gray-50 flex-shrink-0">Gerar</button>
        </div>
      </div>
      <button onClick={create} disabled={creating||!form.email||!form.password} className="w-full text-white rounded-xl py-3 text-sm font-semibold hover:opacity-90 flex items-center justify-center gap-2 disabled:opacity-40 bg-green-600">
        {creating?<Spin white/>:'Criar cliente'}
      </button>
      {created && (
        <div className="rounded-xl bg-green-50 border border-green-100 p-4 flex flex-col gap-3">
          <div className="flex items-center gap-2"><span className="text-green-600">OK</span><p className="text-sm font-semibold text-green-800">Cliente criado!</p></div>
          <div className="bg-white rounded-xl p-3 font-mono text-xs flex flex-col gap-1">
            <p><span className="text-gray-400">E-mail: </span><span className="font-semibold">{created.email}</span></p>
            <p><span className="text-gray-400">Senha:  </span><span className="font-semibold">{created.password}</span></p>
          </div>
          <button onClick={copyMsg} className="w-full flex items-center justify-center gap-2 bg-green-600 text-white rounded-xl py-2.5 text-sm font-semibold hover:opacity-90">
            {copied?'Copiado!':'Copiar para WhatsApp'}
          </button>
          <button onClick={()=>setCreated(null)} className="text-xs text-gray-400 hover:text-gray-600 text-center">Criar outro cliente</button>
        </div>
      )}
    </div>
  );
};

          <div className="rounded-xl p-4 bg-gray-50 border border-gray-100">
            <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">Pre-visualizacao</p>
            <div className="flex items-center gap-3 p-3 rounded-xl w-fit" style={{background:'#0f172a'}}>
              <div className="w-9 h-9 rounded-xl flex items-center justify-center overflow-hidden" style={{background:form.color}}>
                {form.logo_url ? <img src={form.logo_url} alt="logo" className="w-full h-full object-cover"/> : <span className="text-lg">{form.logo}</span>}
              </div>
              <span className="font-bold text-white">{form.name||'Nome da empresa'}</span>
            </div>
          </div>
          <button onClick={saveBrand} disabled={saving} className="w-full text-white rounded-xl py-3 text-sm font-semibold hover:opacity-90 flex items-center justify-center gap-2" style={{background:form.color}}>
            {saving?<Spin white/>:'Salvar e aplicar'}
          </button>
        </Card>
      )}
      {tab==='security' && (
        <Card className="p-6 flex flex-col gap-5">
          <div><p className="text-sm font-semibold text-gray-800 mb-1">Alterar senha</p><p className="text-xs text-gray-400 mb-4">Use uma senha forte com letras, numeros e simbolos.</p>
            <div className="flex flex-col gap-3">
              <Inp label="Nova senha" type="password" value={pwForm.newPw} onChange={e=>setPwForm(f=>({...f,newPw:e.target.value}))} placeholder="Minimo 8 caracteres" hint={pwForm.newPw.length>0&&pwForm.newPw.length<8?'Muito curta':''}/>
              <Inp label="Confirmar senha" type="password" value={pwForm.confirm} onChange={e=>setPwForm(f=>({...f,confirm:e.target.value}))} placeholder="Repita a senha" hint={pwForm.confirm&&pwForm.newPw!==pwForm.confirm?'Senhas diferentes':''}/>
              <button onClick={changePw} disabled={pwSaving||!pwForm.newPw||!pwForm.confirm} className="w-full text-white rounded-xl py-3 text-sm font-semibold hover:opacity-90 flex items-center justify-center gap-2 disabled:opacity-40" style={{background:'#374151'}}>
                {pwSaving?<Spin white/>:'Alterar senha'}
              </button>
            </div>
          </div>
          <div className="border-t border-gray-100 pt-4">
            <p className="text-sm font-semibold text-gray-800 mb-2">Seguranca do sistema</p>
            {['Dados criptografados no Supabase','Cada usuario acessa apenas seus dados (RLS)','Conexao sempre via HTTPS','Sessao expira automaticamente','Nunca compartilhe sua senha'].map((s,i)=>(
              <div key={i} className="flex items-start gap-2 mb-1.5"><span className="text-green-500 text-sm">OK</span><p className="text-sm text-gray-600">{s}</p></div>
            ))}
          </div>
        </Card>
      )}
      {tab==='account' && (
        <Card className="p-6 flex flex-col gap-4">
          <div className="flex items-center gap-3 p-4 bg-gray-50 rounded-xl">
            <div className="w-10 h-10 rounded-xl flex items-center justify-center text-white text-sm font-bold" style={{background:brand.color}}>
              {session&&session.user&&session.user.email?session.user.email[0].toUpperCase():'U'}
            </div>
            <div><p className="text-sm font-semibold text-gray-800">{session&&session.user?session.user.email:''}</p><p className="text-xs text-gray-400">Usuario ativo</p></div>
          </div>
          <div className="border-t border-gray-100 pt-2">
            <div className="flex justify-between text-sm mb-1.5"><span className="text-gray-500">Versao</span><span className="font-medium">5.0</span></div>
            <div className="flex justify-between text-sm mb-1.5"><span className="text-gray-500">Banco</span><span className="font-medium">Supabase (PostgreSQL)</span></div>
            <div className="flex justify-between text-sm"><span className="text-gray-500">Hospedagem</span><span className="font-medium">Render</span></div>
          </div>
          <button onClick={()=>confirm('Sair da conta?',()=>sb.auth.signOut())} className="w-full border border-gray-200 text-gray-600 rounded-xl py-2.5 text-sm font-medium hover:bg-gray-50">Sair da conta</button>
        </Card>
      )}
      {tab==='clients' && isAdmin && (
        <Card className="p-6"><AdminPanel toast={toast}/></Card>
      )}
    </div>
  );
};

const Login = () => {
  const [email,setEmail] = useState('');
  const [pass,setPass] = useState('');
  const [err,setErr] = useState('');
  const [loading,setLoading] = useState(false);
  const login = async () => {
    if(!email||!pass) return;
    setLoading(true); setErr('');
    const {error} = await sb.auth.signInWithPassword({email,password:pass});
    if(error){
      if(error.message.includes('Invalid'))setErr('E-mail ou senha incorretos.');
      else setErr('Erro ao entrar. Tente novamente.');
    }
    setLoading(false);
  };
  return (
    <div className="min-h-screen flex items-center justify-center p-4" style={{background:'#0f172a'}}>
      <div className="w-full max-w-sm">
        <div className="text-center mb-8">
          <div className="text-5xl mb-3">💼</div>
          <h1 className="text-2xl font-bold text-white">Gestao Financeira</h1>
          <p className="text-slate-400 text-sm mt-1">Entre com seu e-mail e senha</p>
        </div>
        <Card className="p-6 flex flex-col gap-4">
          <Inp label="E-mail" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="seu@email.com"/>
          <Inp label="Senha" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==='Enter'&&login()}/>
          {err && <div className="bg-red-50 border border-red-100 rounded-xl px-4 py-2.5"><p className="text-sm text-red-600">{err}</p></div>}
          <button onClick={login} disabled={loading||!email||!pass} className="w-full text-white rounded-xl py-3 text-sm font-semibold hover:opacity-90 flex items-center justify-center gap-2 mt-1 disabled:opacity-50 bg-green-600">
            {loading?<Spin white/>:'Entrar'}
          </button>
        </Card>
      </div>
    </div>
  );
};

function App() {
  const [session,setSession] = useState(null);
  const [appLoading,setAppLoading] = useState(true);
  const [dataLoading,setDataLoading] = useState(false);
  const [view,setView] = useState('dashboard');
  const [brand,setBrand] = useState(INIT_BRAND);
  const [tx,setTx] = useState([]);
  const [products,setProducts] = useState([]);
  const [losses,setLosses] = useState([]);
  const [sidebarOpen,setSidebarOpen] = useState(false);
  const [toastData,setToastData] = useState(null);
  const [confirmData,setConfirmData] = useState(null);
  const [dataError,setDataError] = useState(null);

  const toast = useCallback((msg,type='success') => {
    setToastData({msg,type});
    setTimeout(()=>setToastData(null),3000);
  },[]);
  const confirm = useCallback((msg,onOk) => setConfirmData({msg,onOk}),[]);

  const loadData = async uid => {
    setDataLoading(true); setDataError(null);
    try {
      const [pr,pdr,txr,lr,roleRes] = await Promise.all([
        sb.from('company_profiles').select('*').eq('user_id',uid).maybeSingle(),
        sb.from('products').select('*').order('created_at').limit(500),
        sb.from('transactions').select('*').order('date',{ascending:false}).limit(500),
        sb.from('losses').select('*').order('date',{ascending:false}).limit(500),
        sb.from('user_roles').select('role').eq('user_id',uid).maybeSingle(),
      ]);
      if(pr.data) setBrand({name:pr.data.name,logo:pr.data.logo,color:pr.data.color,logo_url:pr.data.logo_url||null});
      if(pdr.data) setProducts(pdr.data);
      if(txr.data) setTx(txr.data.map(t=>({...t,desc:t.description,cat:t.category})));
      if(lr.data) setLosses(lr.data.map(l=>({...l,desc:l.description})));
      setIsAdminDB(roleRes?.data?.role==='admin');
    } catch(e) { setDataError('Erro ao carregar dados. Verifique sua conexao.'); }
    setDataLoading(false);
  };

  useEffect(() => {
    sb.auth.getSession().then(({data:{session}}) => {
      setSession(session);
      if(session) loadData(session.user.id);
      setAppLoading(false);
    });
    const {data:{subscription}} = sb.auth.onAuthStateChange((_,session) => {
      setSession(session);
      if(session) loadData(session.user.id);
      else { setTx([]); setProducts([]); setLosses([]); setBrand(INIT_BRAND); }
    });
    return () => subscription.unsubscribe();
  },[]);

  const addTx = async t => {
    const row = {id:t.id,type:t.type,description:t.desc,amount:t.amount,date:t.date,method:t.method||null,category:t.cat||null,items:t.items||null,user_id:session.user.id};
    const {error} = await sb.from('transactions').insert(row);
    if(error){toast('Erro ao salvar.','error');return;}
    setTx(p=>[{...t,...row,desc:row.description,cat:row.category},...p]);
  };
  const editTx = async (id,u) => {
    const row = {description:u.desc,amount:u.amount,date:u.date,method:u.method||null,category:u.cat||null};
    const {error} = await sb.from('transactions').update(row).eq('id',id);
    if(!error) setTx(p=>p.map(t=>t.id===id?{...t,...row,desc:row.description,cat:row.category}:t));
    else toast('Erro ao atualizar.','error');
  };
  const deleteTx = async id => { await sb.from('transactions').delete().eq('id',id); setTx(p=>p.filter(t=>t.id!==id)); };

  const addProduct = async p => {
    const row = {...p,user_id:session.user.id};
    const {error} = await sb.from('products').insert(row);
    if(error){toast('Erro ao salvar produto.','error');return;}
    setProducts(prev=>[...prev,row]);
  };
  const editProduct = async (id,u) => {
    const {error} = await sb.from('products').update(u).eq('id',id);
    if(!error) setProducts(p=>p.map(p=>p.id===id?{...p,...u}:p));
    else toast('Erro ao atualizar.','error');
  };
  const deleteProduct = async id => { await sb.from('products').delete().eq('id',id); setProducts(p=>p.filter(p=>p.id!==id)); };
  const adjustStock = async (id,delta) => {
    const p = products.find(p=>p.id===id); if(!p) return;
    const ns = Math.max(0,(p.stock||0)+delta);
    await sb.from('products').update({stock:ns}).eq('id',id);
    setProducts(p=>p.map(p=>p.id===id?{...p,stock:ns}:p));
  };

  const addLoss = async l => {
    const row = {id:l.id,description:l.desc,qty:l.qty,reason:l.reason||null,date:l.date,user_id:session.user.id};
    const {error} = await sb.from('losses').insert(row);
    if(error){toast('Erro ao salvar perda.','error');return;}
    setLosses(p=>[{...l,...row},...p]);
  };
  const editLoss = async (id,u) => {
    const row = {description:u.desc,qty:u.qty,reason:u.reason||null,date:u.date};
    const {error} = await sb.from('losses').update(row).eq('id',id);
    if(!error) setLosses(p=>p.map(l=>l.id===id?{...l,...row,desc:row.description}:l));
    else toast('Erro ao atualizar.','error');
  };
  const deleteLoss = async id => { await sb.from('losses').delete().eq('id',id); setLosses(p=>p.filter(l=>l.id!==id)); };

  const saveBrand = async nb => {
    const {error} = await sb.from('company_profiles').upsert({user_id:session.user.id,name:nb.name,logo:nb.logo,color:nb.color,logo_url:nb.logo_url||null});
    if(error){showToast('Erro ao salvar configuracoes.','error');return;}
    setBrand(nb);
  };

  const Loader = ({text}) => (
    <div className="min-h-screen flex items-center justify-center flex-col gap-3" style={{background:'#f8fafc'}}>
      <div className="w-10 h-10 border-2 border-gray-200 rounded-full animate-spin" style={{borderTopColor:'#16a34a'}}/>
      {text && <p className="text-sm text-gray-400">{text}</p>}
    </div>
  );

  if(appLoading) return <Loader/>;
  if(!session) return <Login/>;
  if(dataLoading) return <Loader text="Carregando seus dados..."/>;
  if(dataError) return (
    <div className="min-h-screen flex items-center justify-center flex-col gap-4 p-6" style={{background:'#f8fafc'}}>
      <span className="text-4xl">⚠️</span>
      <p className="text-sm font-semibold text-gray-700">{dataError}</p>
      <button onClick={()=>loadData(session.user.id)} className="px-6 py-2.5 text-white rounded-xl text-sm font-semibold bg-green-600">Tentar novamente</button>
    </div>
  );

  const p = {brand,toast,confirm};
  const views = {
    dashboard: <Dashboard tx={tx} products={products} brand={brand} onNav={setView}/>,
    income: <TxView type="income" tx={tx} products={products} onAdd={addTx} onEdit={editTx} onDelete={deleteTx} onDeductStock={(id,qty)=>adjustStock(id,-qty)} {...p}/>,
    expense: <TxView type="expense" tx={tx} products={products} onAdd={addTx} onEdit={editTx} onDelete={deleteTx} onDeductStock={()=>{}} {...p}/>,
    inventory: <InventoryView products={products} losses={losses} onAddProduct={addProduct} onEditProduct={editProduct} onDeleteProduct={deleteProduct} onAddLoss={addLoss} onEditLoss={editLoss} onDeleteLoss={deleteLoss} onAdjustStock={adjustStock} {...p}/>,
    email: <EmailView brand={brand} toast={toast}/>,
    report: <ReportView tx={tx} toast={toast}/>,
    settings: <SettingsView brand={brand} session={session} onSave={saveBrand} toast={toast} confirm={confirm}/>,
  };

  return (
    <div className="min-h-screen flex" style={{background:'#f8fafc'}}>
      <Offline/>
      <Sidebar view={view} onNav={setView} brand={brand} open={sidebarOpen} onClose={()=>setSidebarOpen(false)}/>
      <div className="flex-1 lg:ml-64 flex flex-col min-h-screen">
        <header className="sticky top-0 z-20 bg-white border-b border-gray-100 px-4 py-3 flex items-center gap-3 lg:hidden">
          <button onClick={()=>setSidebarOpen(true)} className="text-gray-400 p-1 rounded-lg hover:bg-gray-100">
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <div className="flex items-center gap-2">
            {brand.logo_url
              ? <img src={brand.logo_url} alt="logo" className="w-7 h-7 rounded-lg object-cover"/>
              : <div className="w-7 h-7 rounded-lg flex items-center justify-center text-sm" style={{background:brand.color}}>{brand.logo}</div>
            }
            <span className="font-bold text-gray-900 text-sm">{brand.name}</span>
          </div>
        </header>
        <main className="flex-1 p-4 lg:p-8 max-w-2xl w-full mx-auto">{views[view]}</main>
      </div>
      <Toast toast={toastData}/>
      {confirmData && <Confirm msg={confirmData.msg} onOk={()=>{confirmData.onOk();setConfirmData(null);}} onCancel={()=>setConfirmData(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
