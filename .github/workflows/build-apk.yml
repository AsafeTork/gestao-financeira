name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      client_name:
        description: 'Nome da empresa'
        required: false
        default: 'Financia'
      logo_url:
        description: 'URL publica do logo'
        required: false
        default: ''
      primary_color:
        description: 'Cor HEX sem # (ex: 002f59)'
        required: false
        default: '002f59'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Instalar componentes Android
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-33" "build-tools;33.0.2" 2>&1 | tail -3

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p android/gradle/wrapper
          curl -fsSL "https://github.com/gradle/gradle/raw/v7.5.0/gradle/wrapper/gradle-wrapper.jar" \
            -o android/gradle/wrapper/gradle-wrapper.jar
          chmod +x android/gradlew

      - name: Instalar Pillow
        run: pip install Pillow --break-system-packages --quiet

      - name: Aplicar nome do app
        env:
          CLIENT_NAME: ${{ github.event.inputs.client_name || 'Financia' }}
        run: |
          sed -i "s|<string name=\"app_name\">.*</string>|<string name=\"app_name\">$CLIENT_NAME</string>|" \
            android/app/src/main/res/values/strings.xml
          echo "App name: $CLIENT_NAME"

      - name: Baixar logo do cliente
        env:
          LOGO_URL: ${{ github.event.inputs.logo_url || '' }}
        run: |
          if [ -n "$LOGO_URL" ]; then
            curl -fsSL "$LOGO_URL" -o /tmp/logo --max-time 20 && echo "Logo OK" || echo "Sem logo"
          fi

      - name: Gerar icones PNG
        env:
          HEX_COLOR: ${{ github.event.inputs.primary_color || '002f59' }}
        run: python3 scripts/gen_icons.py

      - name: Restaurar keystore permanente
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > android/app/financia.jks
          echo "Keystore restaurado: $(ls -lh android/app/financia.jks)"

      - name: Build APK Release assinado
        working-directory: android
        run: |
          ./gradlew assembleRelease --no-daemon 2>&1 | tail -30
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          STORE_FILE: financia.jks
          STORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEYSTORE_PASS }}

      - name: Upload APK
        env:
          CLIENT_NAME: ${{ github.event.inputs.client_name || 'financia' }}
        run: |
          mkdir -p apk-output
          SAFE=$(echo "$CLIENT_NAME" | tr ' ' '-' | tr -cd 'a-zA-Z0-9-' | tr '[:upper:]' '[:lower:]')
          find android -name "*.apk" -exec cp {} "apk-output/${SAFE:-financia}.apk" \;
          ls -lh apk-output/

      - uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.event.inputs.client_name || 'financia' }}
          path: apk-output/
          retention-days: 90
          if-no-files-found: warn
