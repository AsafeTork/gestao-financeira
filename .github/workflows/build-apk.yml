name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Setup Android + Build APK
        run: |
          set -e
          
          # Android SDK
          export ANDROID_HOME=/usr/local/lib/android/sdk
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-33" "build-tools;33.0.2" 2>&1 | tail -3
          
          # Keystore
          keytool -genkeypair -keystore android/app/keystore.jks -alias key0 \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass gestao2024 -keypass gestao2024 \
            -dname "CN=Gestao,O=Gestao,C=BR" -noprompt
          
          # Verificar Gradle disponivel
          gradle --version 2>/dev/null || {
            echo "Instalando Gradle..."
            sudo apt-get install -y gradle 2>&1 | tail -3
          }
          
          echo "Gradle: $(gradle --version | head -1)"
          echo "Java: $(java -version 2>&1 | head -1)"
          echo "ANDROID_HOME: $ANDROID_HOME"
          
          # Build
          cd android
          gradle assembleDebug --no-daemon --stacktrace 2>&1
          
          # Verificar resultado
          echo "=== APKs gerados ==="
          find . -name "*.apk" 2>/dev/null | tee /tmp/apks.txt
          cat /tmp/apks.txt

      - name: Copiar APK
        run: |
          mkdir -p apk-output
          find android -name "*.apk" -exec cp {} apk-output/gestao-financeira.apk \; 2>/dev/null
          ls -lh apk-output/ || echo "Sem APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gestao-financeira-apk
          path: apk-output/
          retention-days: 90
          if-no-files-found: warn
