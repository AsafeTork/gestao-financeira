name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p android/gradle/wrapper
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v7.5.0/gradle/wrapper/gradle-wrapper.jar" \
            -o android/gradle/wrapper/gradle-wrapper.jar
          chmod +x android/gradlew
          echo "Wrapper JAR: $(ls -lh android/gradle/wrapper/gradle-wrapper.jar)"

      - name: Gerar keystore
        run: |
          keytool -genkeypair \
            -keystore android/app/keystore.jks \
            -alias key0 \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass gestao2024 -keypass gestao2024 \
            -dname "CN=Gestao,OU=App,O=Gestao,L=Braganca,S=Para,C=BR" \
            -noprompt
          echo "Keystore OK"

      - name: Build APK
        working-directory: android
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          KEYSTORE_PATH: keystore.jks
          STORE_PASS: gestao2024
          KEY_ALIAS: key0
          KEY_PASS: gestao2024

      - name: Listar APKs
        run: find android -name "*.apk" | xargs ls -lh 2>/dev/null || echo "Sem APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gestao-financeira-v1.0
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: warn
