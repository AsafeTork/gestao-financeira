name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Debug ambiente
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls $ANDROID_HOME/build-tools/ 2>/dev/null | tail -5
          ls $ANDROID_HOME/platforms/ 2>/dev/null | tail -5
          java -version

      - name: Instalar componentes Android
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            --sdk_root=$ANDROID_HOME 2>&1 | tail -5

      - name: Setup Gradle via actions
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.5'

      - name: Gerar keystore
        run: |
          keytool -genkeypair -keystore android/app/keystore.jks -alias key0 \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass gestao2024 -keypass gestao2024 \
            -dname "CN=Gestao,O=Gestao,C=BR" -noprompt

      - name: Build APK Debug (mais simples)
        working-directory: android
        run: |
          gradle assembleDebug --no-daemon --info 2>&1 | tail -60
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Encontrar APK
        run: |
          find android -name "*.apk" 2>/dev/null
          mkdir -p apk-output
          find android -name "*.apk" -exec cp {} apk-output/gestao-financeira.apk \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gestao-financeira-apk
          path: apk-output/
          retention-days: 90
          if-no-files-found: error
