name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Instalar SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-33" "build-tools;33.0.2" 2>/dev/null | tail -3

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p android/gradle/wrapper
          curl -fsSL "https://github.com/gradle/gradle/raw/v7.5.0/gradle/wrapper/gradle-wrapper.jar" \
            -o android/gradle/wrapper/gradle-wrapper.jar
          chmod +x android/gradlew

      - name: Gerar keystore
        run: |
          keytool -genkeypair -keystore android/app/keystore.jks -alias key0 \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass gestao2024 -keypass gestao2024 \
            -dname "CN=Gestao,O=Gestao,L=Braganca,C=BR" -noprompt

      - name: Build APK
        working-directory: android
        run: |
          ./gradlew assembleRelease --no-daemon 2>&1
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          KEYSTORE_PATH: keystore.jks
          STORE_PASS: gestao2024
          KEY_ALIAS: key0
          KEY_PASS: gestao2024

      - name: Encontrar e renomear APK
        run: |
          echo "=== Procurando APKs ==="
          find android -name "*.apk" -type f 2>/dev/null
          mkdir -p apk-output
          find android -name "*.apk" -type f -exec cp {} apk-output/gestao-financeira.apk \; 2>/dev/null
          ls -lh apk-output/ || echo "Sem APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gestao-financeira-apk
          path: apk-output/
          retention-days: 90
          if-no-files-found: error
