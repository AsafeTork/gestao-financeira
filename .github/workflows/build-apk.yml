name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Instalar Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-33" "build-tools;33.0.2" 2>&1 | grep -E "Warning|Error|done" | head -10

      - name: Setup Gradle 7.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.5'

      - name: Verificar estrutura do projeto
        working-directory: android
        run: |
          echo "=== Arquivos do projeto ==="
          find . -name "*.gradle" -o -name "*.xml" -o -name "*.java" | head -20
          echo "=== settings.gradle ==="
          cat settings.gradle
          echo "=== app/build.gradle ==="  
          cat app/build.gradle

      - name: Gerar keystore
        run: |
          keytool -genkeypair -keystore android/app/keystore.jks -alias key0 \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass gestao2024 -keypass gestao2024 \
            -dname "CN=Gestao,O=Gestao,C=BR" -noprompt

      - name: Build APK Debug
        working-directory: android
        run: |
          gradle assembleDebug --no-daemon --info 2>&1
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Verificar resultado
        run: |
          echo "=== Buscando APK em todo o projeto ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "NENHUM APK ENCONTRADO"
          echo "=== Conteudo de android/app/build/ ==="
          find android/app/build -type f 2>/dev/null | head -30 || echo "sem pasta build"
          
          mkdir -p apk-output
          APK=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" apk-output/gestao-financeira.apk
            echo "APK copiado: $APK"
            ls -lh apk-output/
          else
            echo "APK nao gerado"
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gestao-financeira-apk
          path: apk-output/
          retention-days: 90
          if-no-files-found: warn
